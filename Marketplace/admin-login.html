<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD | Textile & Clothing Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Montserrat:wght@900&display=swap" rel="stylesheet">

    <style>
        :root {
            --milk-bg: #E8E1D5; 
            --dark-chocolate: #1A0F0D; 
            --gold-accent: #B8860B;
            --neon-gold: #D4AF37;
        }

        body {
            background-color: var(--milk-bg);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
        }

        .glass-header {
            background: rgba(26, 15, 13, 0.98); 
            backdrop-filter: blur(20px);
            border-bottom: 1.5px solid rgba(212, 175, 55, 0.4);
            position: sticky; 
            top: 0; 
            z-index: 100;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .header-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--neon-gold);
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: center;
        }

        .header-subtext {
            font-size: 0.5rem;
            color: #A0A0A0;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 2px;
            text-align: center;
        }

        .compact-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px 15px;
            padding: 20px 15px;
            max-width: 500px;
            margin: auto;
        }

        .category-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            width: 100%;
        }

        .box-frame {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: var(--dark-chocolate);
            border-radius: 25px; 
            position: relative;
            border: 1.5px solid var(--gold-accent);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            transition: transform 0.2s, background-image 1s ease-in-out;
            background-size: cover;
            background-position: center;
        }

        .category-item:active .box-frame {
            transform: scale(0.95);
        }

        .label-bar {
            background: var(--dark-chocolate);
            padding: 5px 10px;
            text-align: center;
            border-radius: 50px; 
            margin-top: -12px; 
            z-index: 10;
            border: 1.5px solid var(--gold-accent);
            width: 75%;
            box-shadow: 0 5px 12px rgba(0,0,0,0.4);
        }

        .label-bar span {
            color: #FFFFFF;
            font-size: 0.58rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 900;
            display: block;
        }
    </style>
</head>
<body>

    <header class="glass-header">
        <button onclick="history.back()" class="text-white text-lg active:scale-90 transition-transform">
            <i class="fa-solid fa-arrow-left-long"></i>
        </button>
        
        <div>
            <h1 class="header-title">TEXTILE & CLOTHING</h1>
            <p class="header-subtext">Select Sub-Category Hub</p>
        </div>
        
        <div class="w-6"></div> 
    </header>

    <main class="compact-grid">
        <script>
            const categories = [
                "Atamfa", "Laces", "Shadda", "Yadi", 
                "Lifaya", "Sleepwear", "Hijabs", "Gyale", 
                "Underwears", "Caps / Hula", "Men Lace", "Jewelry",
                "Cosmetics", "Shoes", "Bags", "Accessories"
            ];

            categories.forEach(item => {
                let link = "#";
                let boxId = "";
                
                if (item === "Atamfa") {
                    link = "atamfa.html";
                    boxId = 'id="atamfa-preview"';
                } 
                // Annan na hada Shadda da admin_dashboard.html
                else if (item === "Shadda") {
                    link = "admin_dashboard.html";
                }
                else if (item === "Laces") {
                    link = "vendor-dashboard.html";
                }

                document.write(`
                    <a href="${link}" class="category-item">
                        <div class="box-frame" ${boxId}></div>
                        <div class="label-bar">
                            <span>${item}</span>
                        </div>
                    </a>
                `);
            });
        </script>
    </main>

    <div style="height: 40px;"></div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDJfUePiQV5R1YAcnq-zvfd3ty4lbzDs1M",
            authDomain: "global-market-admin.firebaseapp.com",
            projectId: "global-market-admin",
            storageBucket: "global-market-admin.firebasestorage.app",
            messagingSenderId: "259715265619",
            appId: "1:259715265619:web:313919773f57cc5fb9c2a6"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        async function startAtamfaPreview() {
            const previewBox = document.getElementById('atamfa-preview');
            if (!previewBox) return;

            try {
                const snapshot = await db.collection('products')
                    .orderBy('timestamp', 'desc')
                    .limit(5)
                    .get();

                const images = [];
                snapshot.forEach(doc => {
                    if (doc.data().img) images.push(doc.data().img);
                });

                if (images.length > 0) {
                    let i = 0;
                    previewBox.style.backgroundImage = `url('${images[0]}')`;
                    
                    setInterval(() => {
                        i = (i + 1) % images.length;
                        previewBox.style.backgroundImage = `url('${images[i]}')`;
                    }, 3000);
                }
            } catch (err) {
                console.error("Preview Error:", err);
            }
        }

        document.addEventListener('DOMContentLoaded', startAtamfaPreview);
    </script>

</body>
</html>
