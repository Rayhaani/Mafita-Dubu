<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ARCHITECT | ELITE OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;800&family=Inter:wght@300;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ffffff; --bg: #050505; }
        body { 
            background-color: var(--bg); color: white; font-family: 'Inter', sans-serif;
            background-image: url("https://www.transparenttextures.com/patterns/carbon-fibre.png");
        }
        .syne { font-family: 'Syne', sans-serif; }
        
        /* CLASSY HEADER: Minimalist Floating */
        .elite-header {
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(30px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 20px 40px;
        }

        /* CLASSY LAYOUT: Ultra-modern Cards */
        .glass-card {
            background: linear-gradient(145deg, rgba(20,20,20,0.9), rgba(5,5,5,1));
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 40px;
            box-shadow: 20px 20px 60px #020202, -5px -5px 30px rgba(255,255,255,0.02);
            transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .glass-card:hover {
            transform: translateY(-10px);
            border-color: rgba(255, 255, 255, 0.2);
        }

        /* MOBILE OPTIMIZED BUTTONS */
        .btn-luxury {
            background: white; color: black;
            border-radius: 100px; font-weight: 800;
            padding: 12px 30px; font-size: 11px;
            letter-spacing: 2px; text-transform: uppercase;
            transition: 0.4s;
        }
        .btn-luxury:active { scale: 0.9; }

        .delete-icon {
            width: 45px; height: 45px; border-radius: 50%;
            background: rgba(255, 0, 0, 0.1); color: #ff4444;
            display: flex; align-items: center; justify-content: center;
            transition: 0.4s;
        }
        .delete-icon:hover { background: #ff4444; color: white; }

        /* SCROLL ANIMATION */
        .reveal { opacity: 0; transform: translateY(30px); animation: fadeInUp 0.8s forwards; }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header class="elite-header sticky top-0 z-50 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <div class="h-2 w-2 bg-white rounded-full animate-ping"></div>
            <h1 class="syne text-2xl font-black uppercase tracking-tighter">Architect<span class="opacity-30">.OS</span></h1>
        </div>
        <button onclick="logout()" class="text-[10px] font-bold tracking-[0.3em] opacity-50 hover:opacity-100 transition">TERMINATE SESSION</button>
    </header>

    <main class="p-6 md:p-16 max-w-6xl mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-10 mb-20">
            <div class="reveal" style="animation-delay: 0.1s">
                <p class="text-[10px] text-gray-500 font-bold tracking-widest uppercase mb-4">Total Entities</p>
                <h2 id="totalUsers" class="syne text-6xl font-extrabold tracking-tighter">--</h2>
            </div>
            <div class="reveal" style="animation-delay: 0.2s">
                <p class="text-[10px] text-gray-500 font-bold tracking-widest uppercase mb-4">Verified Nodes</p>
                <h2 id="totalVendors" class="syne text-6xl font-extrabold tracking-tighter opacity-40">--</h2>
            </div>
            <div class="reveal" style="animation-delay: 0.3s">
                <p class="text-[10px] text-red-500 font-bold tracking-widest uppercase mb-4">Action Required</p>
                <h2 id="pendingCount" class="syne text-6xl font-extrabold tracking-tighter text-red-600">0</h2>
            </div>
        </div>

        <div class="space-y-8" id="userGrid">
            </div>
    </main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDJfUePiQV5R1YAcnq-zvfd3ty4lbzDs1M",
        authDomain: "global-market-admin.firebaseapp.com",
        projectId: "global-market-admin",
        storageBucket: "global-market-admin.firebasestorage.app",
        messagingSenderId: "259715265619",
        appId: "1:259715265619:web:313919773f57cc5fb9c2a6"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    onSnapshot(collection(db, "users"), (snap) => {
        const grid = document.getElementById('userGrid');
        let pending = 0, vendors = 0, total = 0;
        grid.innerHTML = "";

        snap.forEach(d => {
            const user = d.data();
            total++;
            if(user.role === 'vendor') vendors++;

            if(!user.status || user.status === 'pending') {
                pending++;
                grid.innerHTML += `
                grid.innerHTML += `
                <div class="glass-card w-full p-8 md:p-12 flex flex-col md:flex-row justify-between items-center gap-8 reveal">
                  <div class="flex items-center gap-8">
                        <div class="h-20 w-20 bg-gradient-to-br from-white to-gray-600 rounded-full flex items-center justify-center text-black text-2xl font-black italic">
                            ${(user.fullName || 'A').charAt(0)}
                        </div>
                        <div>
                            <h3 class="syne text-base font-bold tracking-tight">${user.fullName || user.username}</h3>
                            <p class="text-gray-500 font-mono text-sm tracking-tighter mt-1">${user.email}</p>
                            <span class="inline-block mt-4 px-4 py-1 border border-white/10 rounded-full text-[9px] font-bold text-gray-400 uppercase tracking-widest">${user.role || 'Member'}</span>
                        </div>
                    </div>
                    <div class="flex items-center gap-6 w-full md:w-auto">
                        <button onclick="approve('${d.id}')" class="btn-luxury w-full md:w-auto">Authorize Node</button>
                        <button onclick="del('${d.id}')" class="delete-icon"><i class="fa-solid fa-trash-can"></i></button>
                    </div>
                </div>`;
            }
        });

        document.getElementById('totalUsers').innerText = total;
        document.getElementById('totalVendors').innerText = vendors;
        document.getElementById('pendingCount').innerText = pending;

        if(pending === 0) {
            grid.innerHTML = `<div class="p-20 text-center opacity-20 syne text-2xl uppercase tracking-[1em]">All Nodes Verified</div>`;
        }
    });

    window.approve = async (id) => { await updateDoc(doc(db, "users", id), { status: 'approved', role: 'vendor' }); };
    window.del = async (id) => { if(confirm('Erase Identity?')) await deleteDoc(doc(db, "users", id)); };
    window.logout = () => { window.location.href = "login.html"; };
</script>
</body>
</html>
