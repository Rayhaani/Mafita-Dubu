<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ARCHITECT | ELITE OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ffffff; --bg: #050505; }
        body { 
            background-color: var(--bg); color: white; 
            font-family: 'Quicksand', sans-serif;
            background-image: url("https://www.transparenttextures.com/patterns/carbon-fibre.png");
        }
        .syne { font-family: 'Syne', sans-serif; }
        .no-break { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .glass-card {
            background: linear-gradient(145deg, rgba(20,20,20,0.9), rgba(5,5,5,1));
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 40px;
            box-shadow: 20px 20px 60px #020202;
            transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative; /* Essential for edge positioning */
            margin-left: 40px; /* Space for the overlapping circle */
        }

        /* The Overlapping Edge Circle */
        .edge-circle {
            position: absolute;
            left: -40px;
            top: 50%;
            transform: translateY(-50%);
            height: 80px; width: 80px;
            background: white; color: black;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; font-weight: 900; font-style: italic;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .btn-luxury {
            background: white; color: black;
            border-radius: 100px; font-weight: 800;
            padding: 12px 25px; font-size: 11px;
            letter-spacing: 1px; text-transform: uppercase;
            transition: 0.4s;
        }

        .btn-view {
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white; border-radius: 100px;
            padding: 12px 20px; font-size: 11px;
            text-transform: uppercase; font-weight: 700;
        }
        .btn-view:hover { background: rgba(255,255,255,0.1); }

        .delete-icon {
            width: 45px; height: 45px; border-radius: 50%;
            background: rgba(255, 0, 0, 0.1); color: #ff4444;
            display: flex; align-items: center; justify-content: center;
            transition: 0.4s;
        }
    </style>
</head>
<body>

    <header class="p-10 sticky top-0 z-50 flex justify-between items-center bg-black/50 backdrop-blur-xl border-b border-white/5">
        <div class="flex items-center gap-4">
            <div class="h-2 w-2 bg-white rounded-full animate-ping"></div>
            <h1 class="syne text-2xl font-black uppercase tracking-tighter">Architect<span class="opacity-30">.OS</span></h1>
        </div>
    </header>

    <main class="p-6 md:p-16 max-w-6xl mx-auto">
        <div class="space-y-12" id="userGrid"></div>
    </main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDJfUePiQV5R1YAcnq-zvfd3ty4lbzDs1M",
        authDomain: "global-market-admin.firebaseapp.com",
        projectId: "global-market-admin",
        storageBucket: "global-market-admin.firebasestorage.app",
        messagingSenderId: "259715265619",
        appId: "1:259715265619:web:313919773f57cc5fb9c2a6"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    onSnapshot(collection(db, "users"), (snap) => {
        const grid = document.getElementById('userGrid');
        grid.innerHTML = "";

        snap.forEach(async (d) => {
            const user = d.data();
            const role = (user.role || '').toLowerCase();

            // AUTOMATIC APPROVAL logic for Customers and Clients
            if ((role === 'customer' || role === 'client') && (!user.status || user.status === 'pending')) {
                await updateDoc(doc(db, "users", d.id), { status: 'approved' });
                return; // Don't show them in the review list
            }

            // ONLY show Vendor, Expert, Lab for review
            if (['vendor', 'expert', 'lab'].includes(role) && (!user.status || user.status === 'pending')) {
                grid.innerHTML += `
                <div class="glass-card p-10 md:p-14 flex flex-col md:flex-row justify-between items-center gap-8 reveal">
                    <div class="edge-circle">${(user.fullName || 'A').charAt(0).toUpperCase()}</div>
                    
                    <div class="flex flex-col min-w-0">
                        <h3 class="text-2xl font-bold tracking-tight no-break">${user.fullName || user.username}</h3>
                        <p class="text-gray-400 font-mono text-base tracking-tighter mt-1 opacity-70">${user.email}</p>
                        <div class="flex gap-2 mt-4">
                            <span class="px-4 py-1 border border-white/10 rounded-full text-[10px] font-bold text-cyan-400 uppercase tracking-widest">${role}</span>
                        </div>
                    </div>

                    <div class="flex items-center gap-4 w-full md:w-auto">
                        <button onclick="viewUser('${d.id}')" class="btn-view">View Details</button>
                        <button onclick="approve('${d.id}')" class="btn-luxury">Authorize</button>
                        <button onclick="del('${d.id}')" class="delete-icon"><i class="fa-solid fa-trash-can"></i></button>
                    </div>
                </div>`;
            }
        });
    });

    window.approve = async (id) => { await updateDoc(doc(db, "users", id), { status: 'approved' }); };
    window.del = async (id) => { if(confirm('Erase Identity?')) await deleteDoc(doc(db, "users", id)); };
    
    // Placeholder function for viewing details
    window.viewUser = (id) => {
        alert("Fetching full node data for ID: " + id + ". (You can connect this to a modal to see all fields)");
    };
</script>
</body>
</html>
