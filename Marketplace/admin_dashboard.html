<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ARCHITECT | ELITE OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ffffff; --bg: #050505; }
        body { 
            background-color: var(--bg); color: white; 
            font-family: 'Quicksand', sans-serif;
            background-image: url("https://www.transparenttextures.com/patterns/carbon-fibre.png");
            padding-bottom: 120px;
        }
        .syne { font-family: 'Syne', sans-serif; }
        .no-break { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .glass-card {
            background: linear-gradient(145deg, rgba(20,20,20,0.9), rgba(5,5,5,1));
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 40px;
            box-shadow: 20px 20px 60px #020202;
            transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            margin-left: 40px;
        }

        .edge-circle {
            position: absolute; left: -40px; top: 50%;
            transform: translateY(-50%);
            height: 80px; width: 80px;
            background: white; color: black;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; font-weight: 900; font-style: italic;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .btn-luxury { background: white; color: black; border-radius: 100px; font-weight: 800; padding: 12px 25px; font-size: 11px; text-transform: uppercase; }
        .btn-view { border: 1px solid rgba(255, 255, 255, 0.2); color: white; border-radius: 100px; padding: 12px 20px; font-size: 11px; text-transform: uppercase; }
        .delete-icon { width: 45px; height: 45px; border-radius: 50%; background: rgba(255, 0, 0, 0.1); color: #ff4444; display: flex; align-items: center; justify-content: center; }

        /* Dock Menu Style */
        .futuristic-dock {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 100px;
            padding: 12px 25px;
            display: flex; gap: 20px;
            z-index: 10000;
            box-shadow: 0 25px 50px rgba(0,0,0,1);
        }
        .dock-item {
            width: 48px; height: 48px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; color: rgba(255,255,255,0.3);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        .dock-item:hover, .dock-item.active {
            background: white; color: black;
            transform: scale(1.25) translateY(-12px);
        }
    </style>
</head>
<body>

    <header class="p-10 sticky top-0 z-50 flex justify-between items-center bg-black/50 backdrop-blur-xl border-b border-white/5">
        <div class="flex items-center gap-4">
            <div class="h-2 w-2 bg-white rounded-full animate-ping"></div>
            <h1 class="syne text-2xl font-black uppercase tracking-tighter">Architect<span class="opacity-30">.OS</span></h1>
        </div>
    </header>

    <main class="p-6 md:p-16 max-w-6xl mx-auto">
        <div class="space-y-12" id="userGrid"></div>
    </main>

    <div class="futuristic-dock">
    <div class="dock-item" onclick="location.href='admin_dashboard.html'" title="Neural Core">
        <i class="fa-solid fa-microchip"></i>
    </div>

    <div class="dock-item" onclick="location.href='users-database.html'" title="Identity Matrix">
        <i class="fa-solid fa-fingerprint"></i>
    </div>

    <div class="dock-item" onclick="location.href='categories.html'" title="Protocol Arch">
        <i class="fa-solid fa-diagram-project"></i>
    </div>

    <div class="dock-item" title="Firewall OS">
        <i class="fa-solid fa-shield-halved"></i>
    </div>

    <div class="dock-item active" onclick="location.href='registry.html'" title="Ledger Node">
        <i class="fa-solid fa-vault"></i>
    </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDJfUePiQV5R1YAcnq-zvfd3ty4lbzDs1M",
        authDomain: "global-market-admin.firebaseapp.com",
        projectId: "global-market-admin",
        storageBucket: "global-market-admin.firebasestorage.app",
        messagingSenderId: "259715265619",
        appId: "1:259715265619:web:313919773f57cc5fb9c2a6"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    onSnapshot(collection(db, "users"), (snap) => {
        const grid = document.getElementById('userGrid');
        grid.innerHTML = "";
        
        snap.forEach((d) => {
            const user = d.data();
            const id = d.id;
            const role = (user.role || '').toLowerCase();
            const status = (user.status || 'pending').toLowerCase();

            // 1. AUTOMATIC APPROVAL FOR CUSTOMERS
            // Idan customer ne kuma har yanzu yana pending, mu ba shi dama nan take
            if ((role === 'customer' || role === 'client' || role === 'member') && status === 'pending') {
                updateDoc(doc(db, "users", id), { status: 'approved' });
                return; 
            }

            // 2. DISPLAY PENDING VENDORS/EXPERTS/LABS
            // Su wadannan sai ka duba su, don haka idan status dinsu 'pending' ne kawai za su fito anan
            if (['vendor', 'expert', 'lab'].includes(role) && status === 'pending') {
                grid.innerHTML += `
                <div class="glass-card p-10 md:p-14 flex flex-col md:flex-row justify-between items-center gap-8 reveal">
                    <div class="edge-circle">${(user.fullName || 'A').charAt(0).toUpperCase()}</div>
                    <div class="flex flex-col min-w-0">
                        <h3 class="text-2xl font-bold tracking-tight no-break">${user.fullName || user.username}</h3>
                        <p class="text-gray-400 font-mono text-base tracking-tighter mt-1 opacity-70">${user.email}</p>
                        <div class="flex gap-2 mt-4">
                            <span class="px-4 py-1 border border-white/10 rounded-full text-[10px] font-bold text-cyan-400 uppercase tracking-widest">${role}</span>
                        </div>
                    </div>
                    <div class="flex items-center gap-4 w-full md:w-auto">
                        <button onclick="window.viewUser('${id}')" class="btn-view">Details</button>
                        <button onclick="window.authorizeNode('${id}')" class="btn-luxury">Authorize</button>
                        <button onclick="window.del('${id}')" class="delete-icon"><i class="fa-solid fa-trash-can"></i></button>
                    </div>
                </div>`;
            }
        });
    });

    // Wannan shine zai tura su zuwa Identity Ledger
    window.authorizeNode = async (id) => {
        if(confirm('A ba wa wannan asusun izini (Authorize)?')) {
            try {
                await updateDoc(doc(db, "users", id), { status: 'approved' });
                alert("An yi nasara! Yanzu za ka gansu a Identity Ledger.");
            } catch (e) {
                alert("Kuskure: " + e.message);
            }
        }
    };

    window.del = async (id) => { 
        if(confirm('Erase Identity?')) await deleteDoc(doc(db, "users", id)); 
    };

    window.viewUser = (id) => { alert("Fetching data for node: " + id); };
        

</script>
</body>
</html>
