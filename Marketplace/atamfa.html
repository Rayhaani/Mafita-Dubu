<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD | Atamfa Elite Market</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --milk-bg: #E8E1D5; 
            --dark-chocolate: #1A0F0D; 
            --neon-gold: #D4AF37;
            --verified-blue: #00BAFF;
        }

        body { 
            background-color: var(--milk-bg); 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            overflow-x: hidden;
        }

        /* ADS SECTION */
        .ads-wrapper { 
            width: 100%; 
            overflow: hidden; 
            padding: 8px 0; 
            background: transparent; 
        }
        .ads-track { 
            display: flex; 
            gap: 12px; 
            padding-left: 15px; 
            animation: scroll-ads 45s linear infinite; 
        }
        @keyframes scroll-ads { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        .ad-card {
            min-width: 150px; height: 160px;
            background: transparent; 
            border-radius: 20px; border: 1.5px solid var(--neon-gold);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .ad-card i { font-size: 2rem; color: var(--neon-gold); margin-bottom: 8px; }
        .ad-card span { font-size: 0.7rem; color: var(--dark-chocolate); font-weight: 800; text-align: center; text-transform: uppercase; }

        /* MASONRY GRID SYSTEM */
        .main-container { 
            display: flex; 
            gap: 10px; 
            padding: 5px 10px; 
            align-items: flex-start; 
        }
        .column { flex: 1; display: flex; flex-direction: column; gap: 10px; }

        .product-card {
            background: white; border-radius: 14px; overflow: hidden;
            display: flex; flex-direction: column; border: 1px solid rgba(0,0,0,0.05);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            position: relative; /* Added for positioning tags */
        }

        /* NEW FEATURES STYLING */
        .hot-tag {
            position: absolute; top: 8px; left: 8px;
            background: #FF3131; color: white;
            font-size: 7px; font-weight: 900; padding: 2px 6px;
            border-radius: 4px; z-index: 5; box-shadow: 0 0 10px rgba(255,49,49,0.5);
        }

        .live-dot-container {
            position: absolute; top: 8px; right: 8px;
            background: rgba(0,0,0,0.4); padding: 3px 6px;
            border-radius: 20px; display: flex; align-items: center; gap: 4px; z-index: 5;
        }
        .green-pulse {
            width: 6px; height: 6px; background: #39FF14; border-radius: 50%;
            position: relative;
        }
        .green-pulse::after {
            content: ""; position: absolute; width: 100%; height: 100%;
            background: #39FF14; border-radius: 50%; animation: pulse-ring 1.5s infinite;
        }
        @keyframes pulse-ring { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(3.5); opacity: 0; } }

        .ghost-talk {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: rgba(26, 15, 13, 0.85); color: var(--neon-gold);
            font-size: 9px; font-weight: 700; padding: 8px; text-align: center;
            transform: translateY(100%); transition: 0.4s ease; z-index: 10;
        }
        .product-card:hover .ghost-talk { transform: translateY(0); }

        /* IMAGE AREA */
        .first-box .img-area { height: 260px !important; }
        .standard-box .img-area { height: 160px; }
        .img-area { width: 100%; position: relative; background: #f3f3f3; overflow: hidden; }
        .img-area img { width: 100%; height: 100%; object-fit: cover; display: block; transition: 0.5s; }
        .product-card:hover img { transform: scale(1.1); }

        /* DETAILS AREA */
        .details-area { padding: 8px; display: flex; flex-direction: column; gap: 2px; }
        .p-name { font-size: 10px; color: #555; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin: 0 !important; letter-spacing: 0.2px; }
        .p-price { font-size: 15px; font-weight: 800; color: var(--dark-chocolate); margin-bottom: 4px; display: block; line-height: 1; }

        .info-box-compact { background: var(--dark-chocolate); border: 1.2px solid var(--neon-gold); border-radius: 9px; padding: 6px; width: 100%; display: flex; flex-direction: column; gap: 3px; }
        .row-item { display: flex; align-items: center; justify-content: space-between; width: 100%; }
        .trust-bold { display: flex; align-items: center; gap: 3px; font-size: 8.5px; font-weight: 800; color: #fff; }
        .years-bold { font-size: 7.5px; color: #fff; font-weight: 800; background: rgba(255,255,255,0.1); padding: 1px 4px; border-radius: 3px; }
        .loc-bold { display: flex; align-items: center; gap: 3px; font-size: 8px; color: #ddd; font-weight: 700; }
        .stars-group { display: flex; align-items: center; gap: 2px; }
        .stars-mini { display: flex; gap: 0.5px; color: #ff9900; font-size: 7px; }
        .review-count { color: #aaa; font-size: 7px; font-weight: 600; }
        .verified-icon { color: var(--verified-blue); font-size: 9px; }
        .loc-icon { color: #ff4d4d; font-size: 8px; }

    </style>
</head>
<body>

    <div class="ads-wrapper">
        <div class="ads-track">
            <div class="ad-card"><i class="fa-solid fa-wand-magic-sparkles"></i><span>Premium <br> Cotton Hub</span></div>
            <div class="ad-card" style="border-color: #00BAFF;"><i class="fa-solid fa-bolt-lightning" style="color:#00BAFF;"></i><span>Flash Sales <br> Live Now</span></div>
            <div class="ad-card"><i class="fa-solid fa-crown"></i><span>Royal <br> Vendor Space</span></div>
        </div>
    </div>

    <div class="main-container" id="product-grid"></div>
    
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
<script>
const firebaseConfig = {
  apiKey: "AIzaSyDJfUePiQV5R1YAcnq-zvfd3ty4lbzDs1M",
  authDomain: "global-market-admin.firebaseapp.com",
  projectId: "global-market-admin",
  storageBucket: "global-market-admin.firebasestorage.app",
  messagingSenderId: "259715265619",
  appId: "1:259715265619:web:313919773f57cc5fb9c2a6"
};

// 1. Dole ne wannan ya zo farko
const app = firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const sabbinKaya = [
    { name: "Brocade Superior", price: 25000, location: "Kano", status: "online", reviews: "210", img: "https://images.unsplash.com/photo-1605341662540-3343d0476484?q=80&w=1480&auto=format&fit=crop", shout: "Gaskiya wannan kalar sarautace, karka bari a baka labari!" },
    { name: "Getzner Gold", price: 45000, location: "Kaduna", status: "offline", reviews: "95", img: "https://images.unsplash.com/photo-1590736962031-299f24204d1c?q=80&w=1335&auto=format&fit=crop", shout: "An kawo ta yanzu daga Dubai, guda 5 kacal suka rage!" },
    { name: "Super Wax Star", price: 12500, location: "Lagos", status: "online", reviews: "180", img: "https://images.unsplash.com/photo-1594938298603-c8148c4dae35?q=80&w=1480&auto=format&fit=crop", shout: "Free delivery idan ka sayi guda biyu yau!" },
    { name: "Swiss Voile", price: 30000, location: "Abuja", status: "online", reviews: "120", img: "https://images.unsplash.com/photo-1524234107056-1c1f48f64ab8?q=80&w=1374&auto=format&fit=crop", shout: "Wannan ita ce kalar da aka fi yayi a bikin satin nan." },
    { name: "Atamfa Silk", price: 15000, location: "Kano", status: "offline", reviews: "75", img: "https://images.unsplash.com/photo-1589156206699-dec21e05a062?q=80&w=1374&auto=format&fit=crop", shout: "Kalli yadda take kyalli, ba za ta taba fita kala ba." },
    { name: "Shadda Medium", price: 18000, location: "Katsina", status: "online", reviews: "50", img: "https://images.unsplash.com/photo-1621184455862-c163dfb30e0f?q=80&w=1374&auto=format&fit=crop", shout: "Ragi na musamman ga mutum 3 na farko!" },
    { name: "Elite Cotton", price: 9500, location: "Jos", status: "online", reviews: "310", img: "https://images.unsplash.com/photo-1597101014035-da736c93627f?q=80&w=1471&auto=format&fit=crop", shout: "Inganci a farashi mai sauki. Taba ka gani!" }
];

async function yiBulkUpload() {
    console.log("Aiki ya fara...");
    for (const kaya of sabbinKaya) {
        try {
            await db.collection('products').add(kaya);
            console.log("An saka: " + kaya.name);
        } catch (error) {
            console.error("Matsala a: " + kaya.name, error);
        }
    }
    alert("Kaya 7 sun shiga database yanzu! Karka sake refreshing har sai ka rufe layin upload.");
}

// --- SAURAN CODE DIN KA NA CI GABA DA AIKI ---
const shouts = [
    "Wlh wannan kalar tafi tafiya!",
    "Zan rage maka ₦500 idan ka siya!",
    "Free Delivery zuwa Kano yau!",
    "Original ne, idan ya fita kala dawo dashi.",
    "Mutum 10 suna kallon wannan yanzu!"
];
 
async function fetchRealProducts() {
    const grid = document.querySelector('.main-container');
    grid.innerHTML = '<div class="column" id="col1"></div><div class="column" id="col2"></div>';

    try {
        let snapshot = await db.collection('products').get();
        if (snapshot.empty) return;

        let count = 0;
        snapshot.forEach(doc => {
            const p = doc.data();
            const colId = count % 2 === 0 ? 'col1' : 'col2';
            const column = document.getElementById(colId);
            const cardClass = count % 2 === 0 ? "first-box" : "standard-box";
            const randomShout = shouts[Math.floor(Math.random() * shouts.length)];
            
            const cardHTML = `
                <div class="product-card ${cardClass}" onclick="goToProduct('${p.name}', '${p.price}', '${p.img}')" style="cursor: pointer;">
                    <div class="img-area">
                        <div class="hot-tag">HOT ITEM</div>
                        
                        <div class="live-dot-container">
                            <div class="green-pulse"></div>
                            <span style="color:white; font-size:7px; font-weight:800;">LIVE</span>
                        </div>

                        <div class="ghost-talk">
                           <i class="fa-solid fa-bullhorn" style="font-size:12px; margin-bottom:4px;"></i><br>
                           "${randomShout}"
                        </div>

                        <img src="${p.img}" onerror="this.src='https://via.placeholder.com/300'">
                    </div>
                    <div class="details-area">
                        <p class="p-name">${p.name.toUpperCase()}</p>
                        <span class="p-price">₦${Number(p.price).toLocaleString()}</span>
                        
                        <div class="info-box-compact">
                            <div class="row-item">
                                <div class="trust-bold">
                                    <i class="fa-solid fa-circle-check verified-icon"></i>
                                    TrustID Verified
                                </div>
                                <span class="years-bold">3+ YEARS</span>
                            </div>
                            <div class="row-item">
                                <div class="loc-bold">
                                    <i class="fa-solid fa-location-dot loc-icon"></i>
                                    ${p.location || 'Kano, Nigeria'}
                                </div>
                                <div class="stars-group">
                                    <div class="stars-mini">
                                        <i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i>
                                    </div>
                                    <span class="review-count">(${p.reviews || '150'})</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>`;
            column.insertAdjacentHTML('beforeend', cardHTML);
            count++;
        });
    } catch (e) { console.error(e); }
}

document.addEventListener('DOMContentLoaded', fetchRealProducts);
function goToProduct(name, price, img) {
    localStorage.setItem('selectedProduct', JSON.stringify({name, price, img}));
    window.location.href = 'products-page.html';
}
</script>
</body>
</html>
