<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bio-orange: #ff7043; --bg-deep: #08090a; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Quicksand', sans-serif; }
        body { background-color: var(--bg-deep); color: #e0e0e0; padding-bottom: 100px; }

        .bio-card { 
            background: rgba(255, 255, 255, 0.03); border-radius: 25px; padding: 15px; 
            margin: 20px; display: flex; gap: 15px; border: 1px solid rgba(255,255,255,0.05);
            align-items: center;
        }

        #cart-modal {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 85%;
            background: #ffffff; border-radius: 30px 30px 0 0; z-index: 10000;
            display: flex; flex-direction: column; transition: 0.5s ease-in-out;
        }
        #cart-modal.active { bottom: 0; }

        .modal-header { padding: 15px; border-bottom: 1px solid #f5f5f5; flex-shrink: 0; }
        .popup-content-inner { display: flex; align-items: center; justify-content: center; gap: 15px; background: #f9f9f9; padding: 8px 20px; border-radius: 50px; width: fit-content; margin: 0 auto; }
        
        .promo-grid { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 15px;
            -webkit-overflow-scrolling: touch;
        }

        /* GYARAN FOOTER: Wannan zai bar shi a jure a kasa */
        .footer { 
            padding: 20px; 
            border-top: 1px solid #eee; 
            background: white; 
            flex-shrink: 0; /* Kar a bar shi ya matse */
            z-index: 10005;
        }

        .btn-orange { 
            background: #ff5e00; 
            color: #fff; 
            width: 100%; 
            height: 55px; 
            border-radius: 50px; 
            border: none; 
            font-weight: 800; 
            font-size: 15px; 
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }

        .bar-container { position: fixed; bottom: 20px; width: 100%; display: flex; justify-content: center; z-index: 5000; }
        .zenith-slim-bar { width: 92%; height: 65px; background: #0b0b0b; border-radius: 100px; border: 1px solid #3d341f; display: flex; align-items: center; justify-content: space-between; padding: 0 10px; }
        
        /* Progress Circle Styles */
        .timer-circle { position: relative; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; }
        .timer-circle svg { width: 32px; height: 32px; transform: rotate(-90deg); }
        .timer-circle circle { fill: none; stroke-width: 3; stroke: #eee; }
        #progress { stroke: #28a745; stroke-dasharray: 88; stroke-dashoffset: 0; transition: 1s linear; }
        #num { position: absolute; font-size: 10px; color: #333; font-weight: 800; }
    </style>
</head>
<body>

    <div class="bio-card">
        <div style="width: 80px; height: 100px; border-radius: 15px; background: #222;"></div>
        <div>
            <b style="display:block">Atamfa Wax</b>
            <span style="color:var(--bio-orange); font-size:18px; font-weight:800">₦43,938</span>
        </div>
    </div>

    <div id="cart-modal">
        <div class="modal-header">
            <div class="popup-content-inner">
                <div style="color:#333; font-weight:700; font-size:14px;"><i class="fa-solid fa-circle-check" style="color:#28a745"></i> Added to cart</div>
                <div class="timer-circle">
                    <svg><circle cx="16" cy="16" r="14"></circle><circle id="progress" cx="16" cy="16" r="14"></circle></svg>
                    <span id="num">5s</span>
                </div>
            </div>
        </div>

        <div class="promo-grid">
            <script>
                for(let i=1; i<=12; i++) {
                    document.write(`
                        <div style="display:flex; flex-direction:column; align-items:center;">
                            <div style="width:100%; aspect-ratio:1/1.2; background:#f9f9f9; border-radius:12px; border:1px solid #eee;"></div>
                            <div style="margin-top:-12px; background:var(--bio-orange); color:#fff; font-size:9px; padding:2px 8px; border-radius:10px; font-weight:700; z-index:2;">${i} left</div>
                            <div style="margin-top:8px; color:#000; font-weight:800; font-size:12px;">₦57,100</div>
                        </div>
                    `);
                }
            </script>
        </div>

        <div class="footer">
            <a href="checkout.html" style="text-decoration: none;">
                <button type="button" class="btn-orange">
                    Check out these items (14)
                </button>
            </a>
        </div>
    </div>

    <div class="bar-container">
        <div class="zenith-slim-bar" id="dynamic-bar">
            <div style="padding-left: 20px;"><b style="font-size: 20px; color: #fff;">₦43,938</b></div>
            <button style="height:45px; border-radius:50px; border:none; font-weight:800; font-size:11px; cursor:pointer; background:#ff5e00; color:#fff; padding:0 25px;" onclick="openModal()">ADD TO CART</button>
        </div>
    </div>

    <script>
        let popTimer;

        function openModal() {
            const modal = document.getElementById('cart-modal');
            const prog = document.getElementById('progress');
            const num = document.getElementById('num');
            modal.classList.add('active');
            
            clearInterval(popTimer);
            let time = 5;
            prog.style.strokeDashoffset = 88;
            
            const runTimer = () => {
                num.innerText = time + 's';
                prog.style.strokeDashoffset = 88 - (88 * (5 - time) / 5);
                if(time <= 0) { 
                    clearInterval(popTimer); 
                    closeModal(); 
                }
                time--;
            };
            runTimer();
            popTimer = setInterval(runTimer, 1000);
        }

        function closeModal() {
            document.getElementById('cart-modal').classList.remove('active');
            setTimeout(() => {
                const bar = document.getElementById('dynamic-bar');
                if (bar) {
                    bar.innerHTML = `
                        <button style="height:45px; border-radius:50px; border:1.5px solid #fff; font-weight:800; font-size:11px; cursor:pointer; background:transparent; color:#fff; padding:0 20px;" onclick="window.location.href='cart.html'">GO TO CART</button>
                        <div style="text-align:center;"><small style="color:#ffcc33; font-size:9px; font-weight:800; display:block;">14 ITEMS</small><b style="color:#fff; font-size:17px; font-weight:700;">₦187,400</b></div>
                        <button style="height:45px; border-radius:50px; border:none; font-weight:800; font-size:11px; cursor:pointer; background:#ff5e00; color:#fff; padding:0 25px;" onclick="window.location.href='checkout.html'">CHECKOUT</button>
                    `;
                }
            }, 400);
        }
    </script>
</body>
</html>
