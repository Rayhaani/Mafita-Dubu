<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --zenith-gold: #ffcc33;
            --zenith-silver: #e0e0e0;
            --bg-deep: #050505;
            --glass: rgba(255, 255, 255, 0.07);
            --primary-orange: #ff7043;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Quicksand', sans-serif; }

        body {
            background: var(--bg-deep);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000 100%);
            padding-top: 100px;
            padding-bottom: 160px;
        }

        /* --- HEADER --- */
        .zenith-header-new {
            position: fixed; top: 15px; left: 5%; width: 90%; height: 75px;
            background: rgba(10, 10, 10, 0.7);
            backdrop-filter: blur(25px);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; z-index: 3000; border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .cart-left { 
            position: relative; font-weight: 700; font-size: 13px; color: #fff;
            background: rgba(255, 204, 51, 0.1); padding: 12px 20px; border-radius: 18px;
            border-left: 4px solid var(--zenith-gold);
        }
        .cart-left span { color: var(--zenith-gold); font-size: 18px; margin-left: 5px; }

        .zenith-main-trigger {
            width: 45px; height: 45px; background: #111; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.4s; border: 1px solid #333; color: #fff;
        }
        .zenith-main-trigger.active { background: var(--zenith-gold); color: #000; border-color: #fff; }

        /* --- FLOAT CARDS --- */
        .zenith-container { padding: 15px 20px; }

        .float-card {
            background: rgba(255, 255, 255, 0.04);
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 24px;
            display: flex;
            gap: 15px;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: float 4s ease-in-out infinite;
            transition: 0.5s;
        }

        .float-card.selected { border-color: var(--zenith-gold); background: rgba(255, 204, 51, 0.05); }

        /* Makunnin dake kai (Trigger) */
        .zenith-trigger { 
            position: absolute; top: -8px; right: 15px; width: 35px; height: 35px; 
            background: #111; border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; border: 1px solid #333; cursor: pointer; z-index: 10; 
            transition: 0.4s; color: #fff; font-size: 12px;
        }
        .selected .zenith-trigger { background: var(--zenith-gold); color: #000; border-color: #fff; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .img-box { position: relative; flex-shrink: 0; }
        .product-img {
            width: 90px; height: 110px;
            border-radius: 18px;
            object-fit: cover;
        }

        .stock-tag {
            position: absolute; top: -10px; left: -5px;
            background: var(--primary-orange);
            font-size: 8px; font-weight: 700;
            padding: 3px 8px; border-radius: 20px;
            z-index: 5;
        }

        .info-box { flex: 1; }
        .title { font-size: 14px; font-weight: 600; margin-bottom: 8px; line-height: 1.4; opacity: 0.9; }

        .price-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 12px; }
        .now { font-size: 18px; font-weight: 700; color: #fff; }
        .old { font-size: 11px; text-decoration: line-through; color: rgba(255,255,255,0.4); }

        .card-footer { display: flex; justify-content: space-between; align-items: center; }
        .qty-control {
            display: flex; align-items: center;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px; padding: 4px;
        }
        .qty-control button {
            width: 28px; height: 28px; border: none; background: transparent;
            color: #fff; font-size: 16px; cursor: pointer;
        }
        .qty-control span { padding: 0 10px; font-weight: 700; font-size: 14px; }

        /* --- FOOTER --- */
        .zenith-footer-integrated {
            position: fixed; bottom: 25px; left: 5%; width: 90%; height: 80px; background: #000; border-radius: 25px; display: flex; align-items: center; padding: 5px; z-index: 2000; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .zenith-footer-integrated::before { content: ''; position: absolute; width: 150%; height: 150%; background: conic-gradient(from 0deg, transparent, var(--zenith-gold), transparent, #fff, transparent); animation: supernovaRotate 3s linear infinite; z-index: -1; }
        .zenith-footer-integrated::after { content: ''; position: absolute; inset: 2px; background: #080808; border-radius: 23px; z-index: 0; }
        @keyframes supernovaRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .total-section { position: relative; z-index: 1; padding-left: 25px; flex: 1; }
        .total-section b { display: block; font-size: 22px; color: #fff; }
        .checkout-zenith-btn { position: relative; z-index: 1; background: var(--zenith-gold); color: #000; border: none; height: 100%; padding: 0 35px; border-radius: 20px; font-weight: 900; font-size: 13px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="zenith-footer-integrated">
        <div class="total-section">
            <small style="color:var(--zenith-gold); font-size:9px; font-weight:700;">PAYABLE</small>
            <b id="total">₦0</b>
        </div>
        <button class="checkout-zenith-btn" onclick="goToCheckout()">
    CHECKOUT (<span id="btn-count">0</span>)
        </button>
    </div>
        
    <script>
        function toggleAll() {
            const mainToggle = document.getElementById('main-toggle');
            const isActive = mainToggle.classList.toggle('active');
            document.querySelectorAll('.float-card').forEach(card => {
                if(isActive) card.classList.add('selected');
                else card.classList.remove('selected');
            });
            update();
        }

        function toggleZenith(el) {
            const card = el.closest('.float-card');
            card.classList.toggle('selected');
            update();
        }

        function qty(btn, n) {
            const s = btn.parentElement.querySelector('.val');
            let v = parseInt(s.innerText) + n;
            if(v >= 1) { s.innerText = v; update(); }
        }

        function del(i) {
            const card = i.closest('.float-card');
            card.style.transform = 'scale(0.5)';
            card.style.opacity = '0';
            setTimeout(() => { card.remove(); update(); }, 400);
        }

        function update() {
            let t = 0; let count = 0;
            const allCards = document.querySelectorAll('.float-card');
            const selectedCards = document.querySelectorAll('.float-card.selected');
            
            selectedCards.forEach(card => {
                t += parseInt(card.dataset.price) * parseInt(card.querySelector('.val').innerText);
                count++;
            });

            document.getElementById('total').innerText = "₦" + t.toLocaleString();
            document.getElementById('btn-count').innerText = count;
            document.getElementById('count-top').innerText = count;

            // Gyara toggle switch na sama
            const mainToggle = document.getElementById('main-toggle');
            if (allCards.length > 0 && selectedCards.length === allCards.length) {
                mainToggle.classList.add('active');
            } else {
                mainToggle.classList.remove('active');
            }
        }
        update();

        function goToCheckout() {
    // Mu duba ko akwai kayan da aka zaba
    const count = parseInt(document.getElementById('btn-count').innerText);

    if (count > 0) {
        // Idan akwai kaya, mu tura shi checkout
        window.location.href = 'checkout.html';
    } else {
        // Idan babu, mu nuna masa sako cikin kyan gani
        alert("Don Allah abokina, zabi kaya akalla daya kafin ka wuce zuwa Checkout! 😊");
        
        // Zaka iya kara girgiza footer din don ya lura
        const footer = document.querySelector('.zenith-footer-integrated');
        footer.style.animation = 'none';
        setTimeout(() => {
            footer.style.border = '2px solid #ff0000';
            setTimeout(() => { footer.style.border = '1px solid rgba(255, 255, 255, 0.1)'; }, 1000);
        }, 10);
    }
        }
        


        
    </script>
