<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD | Shopping Cart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@800&display=swap" rel="stylesheet">

    <style>
        :root { 
            --milk-bg: #E8E1D5; 
            --dark-chocolate: #1A0F0D; 
            --neon-gold: #D4AF37; 
            --universal-gap: 12px; 
        }
        
        body { background-color: var(--milk-bg); font-family: 'Inter', sans-serif; margin: 0; padding: var(--universal-gap); }

        .cart-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .back-btn { width: 40px; height: 40px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer; }
        .cart-title { font-family: 'Plus+Jakarta+Sans', sans-serif; font-size: 20px; font-weight: 800; color: var(--dark-chocolate); }

        /* Wannan shine container din da zamu zuba kayan a ciki */
        #cart-items-list { display: flex; flex-direction: column; gap: 15px; }

        .cart-item { 
            background: white; 
            border-radius: 18px; 
            padding: 12px; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .item-img { width: 80px; height: 80px; border-radius: 12px; object-fit: cover; }
        
        .item-info { flex: 1; }
        .item-name { font-weight: 700; font-size: 14px; color: var(--dark-chocolate); text-transform: capitalize; margin-bottom: 4px; }
        .item-price { font-weight: 800; color: var(--neon-gold); font-size: 16px; }

        .remove-btn { color: #FF3131; font-size: 18px; cursor: pointer; padding: 10px; }

        .checkout-footer { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: var(--dark-chocolate); 
            padding: 20px; 
            border-radius: 25px 25px 0 0; 
            box-shadow: 0 -10px 30px rgba(0,0,0,0.2); 
        }
        
        .total-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .total-label { color: #aaa; font-size: 14px; font-weight: 600; }
        .total-amount { color: white; font-size: 22px; font-weight: 800; }

        .pay-btn { 
            background: linear-gradient(135deg, #D4AF37 0%, #F1D592 50%, #D4AF37 100%); 
            color: var(--dark-chocolate); 
            width: 100%; 
            padding: 15px; 
            border-radius: 15px; 
            font-weight: 800; 
            text-align: center; 
            font-size: 16px; 
            text-transform: uppercase; 
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="cart-header">
        <div class="back-btn" onclick="window.history.back()"><i class="fa-solid fa-arrow-left"></i></div>
        <div class="cart-title">Kwandon Sayayya</div>
    </div>

    <div id="cart-items-list">
        </div>

    <div style="height: 180px;"></div> <div class="checkout-footer">
        <div class="total-row">
            <span class="total-label">Jimillar Kuɗi</span>
            <span class="total-amount" id="cart-total">₦0</span>
        </div>
        <div class="pay-btn">Biya Kuɗi Yanzu</div>
    </div>

    <script>
        function loadCart() {
            const listContainer = document.getElementById('cart-items-list');
            const totalElement = document.getElementById('cart-total');
            
            // Dauko kayan daga LocalStorage
            let cart = JSON.parse(localStorage.getItem('cartItems')) || [];

            if (cart.length === 0) {
                listContainer.innerHTML = `
                    <div style="text-align:center; padding: 50px 20px;">
                        <i class="fa-solid fa-basket-shopping" style="font-size: 50px; color: #ccc; margin-bottom: 15px;"></i>
                        <p style="color: #888; font-weight: 600;">Kwandonka babu komai a ciki.</p>
                        <button onclick="window.history.back()" style="margin-top: 20px; color: var(--neon-gold); font-weight: 800;">Koma Kasuwa</button>
                    </div>`;
                totalElement.innerText = "₦0";
                return;
            }

            let total = 0;
            listContainer.innerHTML = ''; // Goge komai kafin mu sa sababbi

            cart.forEach((item, index) => {
                total += Number(item.price);
                
                listContainer.innerHTML += `
                    <div class="cart-item">
                        <img src="${item.img}" class="item-img">
                        <div class="item-info">
                            <div class="item-name">${item.name.toLowerCase()}</div>
                            <div class="item-price">₦${Number(item.price).toLocaleString()}</div>
                        </div>
                        <div class="remove-btn" onclick="removeItem(${index})">
                            <i class="fa-solid fa-trash-can"></i>
                        </div>
                    </div>`;
            });

            totalElement.innerText = "₦" + total.toLocaleString();
        }

        function removeItem(index) {
            let cart = JSON.parse(localStorage.getItem('cartItems')) || [];
            cart.splice(index, 1); // Cire abinda aka danna
            localStorage.setItem('cartItems', JSON.stringify(cart));
            loadCart(); // Sake loading din page din
        }

        // Fara aiki da zaran an bude page
        document.addEventListener('DOMContentLoaded', loadCart);
    </script>
</body>
</html>
