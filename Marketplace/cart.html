<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --zenith-gold: #ffcc33;
            --zenith-silver: #e0e0e0;
            --bg-deep: #050505;
            --glass: rgba(255, 255, 255, 0.07);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Quicksand', sans-serif; }

        body {
            background: var(--bg-deep);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000 100%);
            padding-top: 100px;
            padding-bottom: 160px;
        }

        /* --- HEADER --- */
        .zenith-header-new {
            position: fixed; top: 15px; left: 5%; width: 90%; height: 75px;
            background: rgba(10, 10, 10, 0.7);
            backdrop-filter: blur(25px);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px;
            z-index: 3000;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .cart-left { 
            position: relative;
            font-weight: 700; font-size: 13px; color: #fff;
            background: rgba(255, 204, 51, 0.1);
            padding: 12px 20px; border-radius: 18px;
            border-left: 4px solid var(--zenith-gold);
        }
        .cart-left span { color: var(--zenith-gold); font-size: 18px; margin-left: 5px; }

        .header-right-toggle { display: flex; align-items: center; gap: 12px; }
        .all-label { font-size: 12px; font-weight: 700; letter-spacing: 2px; color: var(--zenith-silver); opacity: 0.8; }

        .zenith-main-trigger {
            width: 45px; height: 45px;
            background: #111;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.4s;
            border: 1px solid #333;
            color: #fff;
        }
        .zenith-main-trigger.active { background: var(--zenith-gold); color: #000; border-color: #fff; }

        /* --- CONTAINER & CARDS --- */
        .zenith-container { padding: 15px 20px; }
        
        .zenith-card {
            background: var(--glass); 
            backdrop-filter: blur(25px); 
            border-radius: 35px;
            margin-bottom: 20px;
            padding: 12px 20px;
            display: flex; 
            align-items: center; 
            gap: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1); 
            position: relative;
            transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .zenith-card.selected { border-color: var(--zenith-gold); background: rgba(255, 204, 51, 0.05); transform: translateY(-5px) scale(1.01); }
        
        .sphere-wrapper { 
            width: 90px; 
            height: 90px; 
            position: relative; 
            flex-shrink: 0; 
            border-radius: 50%; 
            padding: 4px; 
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.2)); 
            overflow: hidden;
        }
        .img-sphere { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        
        .zenith-trigger { position: absolute; top: -8px; right: 15px; width: 40px; height: 40px; background: #111; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid #333; cursor: pointer; z-index: 10; }
        .selected .zenith-trigger { background: var(--zenith-gold); color: #000; border-color: #fff; }
        
        .info-zenith { flex: 1; }
        .name { font-size: 13px; font-weight: 700; color: var(--zenith-silver); margin-bottom: 2px; }
        .price { font-size: 20px; font-weight: 300; }
        
        .controls { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
        .qty-zenith { display: flex; align-items: center; gap: 15px; background: rgba(255,255,255,0.05); padding: 3px 15px; border-radius: 20px; }
        .qty-zenith button { background: none; border: none; color: #fff; font-size: 16px; cursor: pointer; }

        /* --- FOOTER --- */
        .zenith-footer-integrated {
            position: fixed; bottom: 25px; left: 5%; width: 90%; height: 80px; background: #000; border-radius: 25px; display: flex; align-items: center; padding: 5px; z-index: 2000; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .zenith-footer-integrated::before { content: ''; position: absolute; width: 150%; height: 150%; background: conic-gradient(from 0deg, transparent, var(--zenith-gold), transparent, #fff, transparent); animation: supernovaRotate 3s linear infinite; z-index: -1; }
        .zenith-footer-integrated::after { content: ''; position: absolute; inset: 2px; background: #080808; border-radius: 23px; z-index: 0; }
        @keyframes supernovaRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .total-section { position: relative; z-index: 1; padding-left: 25px; flex: 1; }
        .total-section small { color: var(--zenith-gold); font-size: 9px; letter-spacing: 2px; font-weight: 700; }
        .total-section b { display: block; font-size: 22px; color: #fff; }
        
        .checkout-zenith-btn { position: relative; z-index: 1; background: var(--zenith-gold); color: #000; border: none; height: 100%; padding: 0 35px; border-radius: 20px; font-weight: 900; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="zenith-header-new">
        <div class="cart-left">CART <span>( <b id="count-top">6</b> )</span></div>
        <div class="header-right-toggle">
            <span class="all-label">ALL</span>
            <div class="zenith-main-trigger active" id="main-toggle" onclick="toggleAll()">
                <i class="fa-solid fa-bolt"></i>
            </div>
        </div>
    </div>

    <div class="zenith-container">
        <div class="zenith-card selected" data-price="43938">
            <div class="zenith-trigger" onclick="toggleZenith(this)"><i class="fa-solid fa-bolt"></i></div>
            <div class="sphere-wrapper"><img src="https://i.postimg.cc/HngghH85/IMG-20260306-WA0103.jpg" class="img-sphere"></div>
            <div class="info-zenith">
                <div class="name">SUPREME GOLD WAX</div>
                <div class="price">₦43,938</div>
                <div class="controls">
                    <div class="qty-zenith"><button onclick="qty(this,-1)">-</button><span class="val">1</span><button onclick="qty(this,1)">+</button></div>
                    <i class="fa-solid fa-circle-nodes" style="opacity: 0.2; cursor: pointer;" onclick="del(this)"></i>
                </div>
            </div>
        </div>

        <div class="zenith-card selected" data-price="43938">
            <div class="zenith-trigger" onclick="toggleZenith(this)"><i class="fa-solid fa-bolt"></i></div>
            <div class="sphere-wrapper"><img src="https://i.postimg.cc/FzDBVQjw/IMG-20260306-WA0102.jpg" class="img-sphere"></div>
            <div class="info-zenith">
                <div class="name">CLASSIC MAROON</div>
                <div class="price">₦43,938</div>
                <div class="controls">
                    <div class="qty-zenith"><button onclick="qty(this,-1)">-</button><span class="val">1</span><button onclick="qty(this,1)">+</button></div>
                    <i class="fa-solid fa-circle-nodes" style="opacity: 0.2; cursor: pointer;" onclick="del(this)"></i>
                </div>
            </div>
        </div>

        <div class="zenith-card selected" data-price="43938">
            <div class="zenith-trigger" onclick="toggleZenith(this)"><i class="fa-solid fa-bolt"></i></div>
            <div class="sphere-wrapper"><img src="https://i.postimg.cc/ZKsQ94Yf/IMG-20260306-WA0101.jpg" class="img-sphere"></div>
            <div class="info-zenith">
                <div class="name">ROYAL INDIGO WAX</div>
                <div class="price">₦43,938</div>
                <div class="controls">
                    <div class="qty-zenith"><button onclick="qty(this,-1)">-</button><span class="val">1</span><button onclick="qty(this,1)">+</button></div>
                    <i class="fa-solid fa-circle-nodes" style="opacity: 0.2; cursor: pointer;" onclick="del(this)"></i>
                </div>
            </div>
        </div>

        <div class="zenith-card selected" data-price="43938">
            <div class="zenith-trigger" onclick="toggleZenith(this)"><i class="fa-solid fa-bolt"></i></div>
            <div class="sphere-wrapper"><img src="https://i.postimg.cc/gJpt904P/IMG-20260306-WA0100.jpg" class="img-sphere"></div>
            <div class="info-zenith">
                <div class="name">VINTAGE PATTERN</div>
                <div class="price">₦43,938</div>
                <div class="controls">
                    <div class="qty-zenith"><button onclick="qty(this,-1)">-</button><span class="val">1</span><button onclick="qty(this,1)">+</button></div>
                    <i class="fa-solid fa-circle-nodes" style="opacity: 0.2; cursor: pointer;" onclick="del(this)"></i>
                </div>
            </div>
        </div>

        <div class="zenith-card selected" data-price="43938">
            <div class="zenith-trigger" onclick="toggleZenith(this)"><i class="fa-solid fa-bolt"></i></div>
            <div class="sphere-wrapper"><img src="https://i.postimg.cc/RhsgnLm0/IMG-20260306-WA0099.jpg" class="img-sphere"></div>
            <div class="info-zenith">
                <div class="name">PREMIUM EMERALD</div>
                <div class="price">₦43,938</div>
                <div class="controls">
                    <div class="qty-zenith"><button onclick="qty(this,-1)">-</button><span class="val">1</span><button onclick="qty(this,1)">+</button></div>
                    <i class="fa-solid fa-circle-nodes" style="opacity: 0.2; cursor: pointer;" onclick="del(this)"></i>
                </div>
            </div>
        </div>

        <div class="zenith-card selected" data-price="43938">
            <div class="zenith-trigger" onclick="toggleZenith(this)"><i class="fa-solid fa-bolt"></i></div>
            <div class="sphere-wrapper"><img src="https://i.postimg.cc/nhQ3CmwP/IMG-20260306-WA0098.jpg" class="img-sphere"></div>
            <div class="info-zenith">
                <div class="name">MIDNIGHT PURPLE</div>
                <div class="price">₦43,938</div>
                <div class="controls">
                    <div class="qty-zenith"><button onclick="qty(this,-1)">-</button><span class="val">1</span><button onclick="qty(this,1)">+</button></div>
                    <i class="fa-solid fa-circle-nodes" style="opacity: 0.2; cursor: pointer;" onclick="del(this)"></i>
                </div>
            </div>
        </div>
    </div>

    <div class="zenith-footer-integrated">
        <div class="total-section">
            <small>PAYABLE</small>
            <b id="total">₦263,628</b>
        </div>
        <button class="checkout-zenith-btn">CHECKOUT (<span id="btn-count">6</span>)</button>
    </div>

    <script>
        function toggleAll() {
            const mainToggle = document.getElementById('main-toggle');
            const isActive = mainToggle.classList.toggle('active');
            document.querySelectorAll('.zenith-card').forEach(card => {
                if (isActive) card.classList.add('selected');
                else card.classList.remove('selected');
            });
            update();
        }

        function toggleZenith(el) {
            const card = el.closest('.zenith-card');
            card.classList.toggle('selected');
            const total = document.querySelectorAll('.zenith-card').length;
            const selected = document.querySelectorAll('.zenith-card.selected').length;
            const mainToggle = document.getElementById('main-toggle');
            if (selected === total) mainToggle.classList.add('active');
            else mainToggle.classList.remove('active');
            update();
        }

        function qty(btn, n) {
            const s = btn.parentElement.querySelector('.val');
            let v = parseInt(s.innerText) + n;
            if(v >= 1) { s.innerText = v; update(); }
        }

        // --- NAN KAWAI NA SAKA ---
        function del(i) {
            const card = i.closest('.zenith-card');
            card.style.transform = 'scale(0)';
            card.style.opacity = '0';
            setTimeout(() => { 
                card.remove(); 
                update(); 
            }, 400);
        }

        function update() {
            let t = 0; let count = 0;
            document.querySelectorAll('.zenith-card.selected').forEach(card => {
                t += parseInt(card.dataset.price) * parseInt(card.querySelector('.val').innerText);
                count++;
            });
            document.getElementById('total').innerText = "₦" + t.toLocaleString();
            document.getElementById('btn-count').innerText = count;
            document.getElementById('count-top').innerText = count;
        }
        update();
    </script>
</body>
  </html>
