<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCHITECT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg-main: #000000; --panel-bg: #0a0a0a; --border-color: rgba(255, 255, 255, 0.08); }
        
        body { 
            background-color: var(--bg-main); color: #ffffff; 
            font-family: 'Quicksand', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .syne { font-family: 'Syne', sans-serif; }

        .panel-container {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            transition: border 0.3s ease;
        }
        .panel-container:hover { border-color: rgba(255, 255, 255, 0.15); }

        .standard-input {
            background: #111111;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: white;
            padding: 12px 16px;
            width: 100%;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .standard-input:focus { border-color: white; outline: none; background: #161616; }

        .nav-link {
            font-size: 10px; font-weight: 700; letter-spacing: 2px;
            padding: 10px 24px; border-radius: 6px;
            transition: all 0.3s ease; border: 1px solid transparent;
            color: rgba(255,255,255,0.4);
        }
        .nav-link.active { 
            background: white; color: black; border-color: white;
        }
        .nav-link:hover:not(.active) { color: white; border-color: var(--border-color); }

        .data-row {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 14px 20px;
            display: flex; justify-content: space-between; align-items: center;
            transition: background 0.2s;
            margin-bottom: 8px;
        }
        .data-row:hover { background: rgba(255, 255, 255, 0.04); }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

/* Dock Menu Style */
        .futuristic-dock {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 100px;
            padding: 12px 25px;
            display: flex; gap: 20px;
            z-index: 10000;
            box-shadow: 0 25px 50px rgba(0,0,0,1);
        }
        .dock-item {
            width: 48px; height: 48px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; color: rgba(255,255,255,0.3);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        .dock-item:hover, .dock-item.active {
            background: white; color: black;
            transform: scale(1.25) translateY(-12px);
            }

    </style>
</head>
<body class="p-5 md:p-12 lg:p-16">

        <nav class="flex flex-wrap gap-2 p-1 bg-white/5 rounded-lg border border-white/5 w-full lg:w-auto">
            <button onclick="switchMode('vendor')" id="mode-vendor" class="nav-link active flex-grow lg:flex-none">VENDORS</button>
            <button onclick="switchMode('lab')" id="mode-lab" class="nav-link flex-grow lg:flex-none">LABORATORIES</button>
            <button onclick="switchMode('expert')" id="mode-expert" class="nav-link flex-grow lg:flex-none">EXPERTS</button>
        </nav>
    </header>

    <main class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <section class="lg:col-span-5 panel-container p-8">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-xs font-bold tracking-widest uppercase opacity-60 italic">Master Segments</h2>
                <button onclick="addNewSegment()" class="text-[10px] font-bold border border-white/20 px-4 py-2 rounded hover:bg-white hover:text-black transition">NEW SEGMENT</button>
            </div>
            
            <div class="space-y-3 custom-scroll max-h-[500px] overflow-y-auto pr-2" id="masterList">
                <div class="data-row border-l-2 border-l-white" id="main-node-1">
                    <div>
                        <h3 class="text-sm font-bold tracking-wide">Consumer Electronics</h3>
                        <p class="text-[10px] opacity-30 mt-1 uppercase italic">12 Sub-nodes attached</p>
                    </div>
                    <button onclick="deleteNode('main-node-1')" class="opacity-20 hover:opacity-100 hover:text-red-500 transition"><i class="fa-solid fa-trash-can text-xs"></i></button>
                </div>
            </div>
        </section>

        <section class="lg:col-span-7 panel-container p-8">
            <div class="mb-10">
                <h2 class="text-xs font-bold tracking-widest uppercase opacity-60 italic mb-2">Node Configuration</h2>
                <p class="text-xs text-gray-500">Managing protocols for: <span class="text-white font-bold italic">Consumer Electronics</span></p>
            </div>

            <div class="flex flex-col md:flex-row gap-3 mb-8">
                <input type="text" id="subInput" placeholder="Specify sub-protocol..." class="standard-input font-medium">
                <button onclick="executeAdd()" class="bg-white text-black px-8 py-3 rounded-lg font-bold text-[10px] uppercase tracking-widest hover:bg-gray-200 transition">Execute</button>
            </div>

            <div class="space-y-2 custom-scroll max-h-[350px] overflow-y-auto pr-2" id="subList">
                <div class="data-row" id="sub-node-1">
                    <span class="text-sm font-medium tracking-tight">Mobile Telephony & Hardware</span>
                    <button onclick="deleteNode('sub-node-1')" class="opacity-20 hover:opacity-100 hover:text-red-500 transition"><i class="fa-solid fa-trash-can text-xs"></i></button>
                </div>
                <div class="data-row" id="sub-node-2">
                    <span class="text-sm font-medium tracking-tight">Personal Computing Systems</span>
                    <button onclick="deleteNode('sub-node-2')" class="opacity-20 hover:opacity-100 hover:text-red-500 transition"><i class="fa-solid fa-trash-can text-xs"></i></button>
                </div>
            </div>

            <div class="futuristic-dock">
    <div class="dock-item" onclick="location.href='categories.html'" title="Neural Core">
        <i class="fa-solid fa-microchip"></i>
    </div>

    <div class="dock-item" onclick="location.href='users-database.html'" title="Identity Matrix">
        <i class="fa-solid fa-fingerprint"></i>
    </div>

    <div class="dock-item" onclick="location.href='index.html'" title="Protocol Arch">
        <i class="fa-solid fa-diagram-project"></i>
    </div>

    <div class="dock-item" title="Firewall OS">
        <i class="fa-solid fa-shield-halved"></i>
    </div>

    <div class="dock-item active" onclick="location.href='registry.html'" title="Ledger Node">
        <i class="fa-solid fa-vault"></i>
    </div>
</div>
            
        </section>
    </main>

    <script>
        // Bridge Function for Delete
        function deleteNode(id) {
            if(confirm("Are you sure you want to terminate this node?")) {
                const element = document.getElementById(id);
                element.style.opacity = "0";
                setTimeout(() => element.remove(), 300);
            }
        }

        // Bridge Function for Execute
        function executeAdd() {
            const val = document.getElementById('subInput').value;
            if(val) {
                const list = document.getElementById('subList');
                const id = 'node-' + Date.now();
                list.innerHTML += `
                    <div class="data-row" id="${id}">
                        <span class="text-sm font-medium tracking-tight">${val}</span>
                        <button onclick="deleteNode('${id}')" class="opacity-20 hover:opacity-100 hover:text-red-500 transition"><i class="fa-solid fa-trash-can text-xs"></i></button>
                    </div>`;
                document.getElementById('subInput').value = "";
            }
        }

        function switchMode(mode) {
            const btns = ['vendor', 'lab', 'expert'];
            btns.forEach(b => document.getElementById('mode-' + b).classList.remove('active'));
            document.getElementById('mode-' + mode).classList.add('active');
        }
    </script>
</body>
                    </html>
