<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infinity Luxury Final Build</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400;600&display=swap');

        body {
            background: #E3DAC9; 
            font-family: 'Outfit', sans-serif;
            height: 100dvh; overflow: hidden;
            display: flex; flex-direction: column; margin: 0;
            position: fixed; width: 100%;
        }

        /* SLIDER */
        .slim-slider {
            height: 110px; background: #E3DAC9; overflow: hidden;
            position: relative; border-bottom: 1px solid rgba(212, 175, 55, 0.2); flex-shrink: 0;
        }
        .slide-track { display: flex; width: max-content; animation: scroll 40s linear infinite; height: 100%; align-items: center; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .slide-card { width: 140px; height: 85px; margin: 0 10px; border-radius: 12px; overflow: hidden; flex-shrink: 0; border: 1px solid rgba(212, 175, 55, 0.4); }
        .slide-card img { width: 100%; height: 100%; object-fit: cover; }

        /* CHAT AREA */
        .chat-space { flex: 1; padding: 15px; overflow-y: auto; scrollbar-width: none; padding-bottom: 140px; }
        .bubble { max-width: 82%; padding: 11px 15px; margin-bottom: 12px; font-size: 14.5px; line-height: 1.4; position: relative; }
        .v-bubble { background: #1A0F0D; color: #D4AF37; border-radius: 4px 18px 18px 18px; border-left: 5px solid #FFD700; }
        .u-bubble { background: #FFFFFF; color: #333; border-radius: 18px 18px 4px 18px; margin-left: auto; border: 1px solid #EAEAEA; }

        /* TRUTH GATE */
        #truth-gate { display: none; position: fixed; inset: 0; background: #fff; z-index: 5000; flex-direction: column; }
        .gate-half { flex: 1; position: relative; margin: 12px; border-radius: 35px; overflow: hidden; }
        .alert-btn { position: absolute; bottom: 25px; right: 15px; background: #E11D48; color: white; padding: 12px 24px; border-radius: 18px; font-weight: 800; font-size: 11px; text-transform: uppercase; box-shadow: 0 10px 25px rgba(225, 29, 72, 0.3); cursor: pointer; border:none; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #E3DAC9; padding: 10px 15px 30px; display: flex; align-items: flex-end; gap: 10px; z-index: 1000; }
        .gold-trigger { width: 55px; height: 55px; background: linear-gradient(135deg, #FFD700, #B8860B); border-radius: 18px; display: flex; align-items: center; justify-content: center; color: white; font-size: 20px; }
        .input-pill { flex: 1; min-height: 55px; background: white; border-radius: 18px; padding: 10px 18px; display: flex; align-items: flex-end; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        #userInput { width: 100%; background: transparent; border: none; outline: none; resize: none; max-height: 120px; font-size: 16px; }
    </style>
</head>
<body>

    <div id="truth-gate">
        <div class="gate-half" style="border: 1px solid #eee;">
            <img src="https://images.unsplash.com/photo-1590736704728-f4730bb30770?w=800" class="w-full h-full object-cover">
        </div>
        <div class="gate-half bg-gray-50 flex flex-col items-center justify-center border-t-8 border-amber-500">
            <h2 class="text-gray-300 font-black italic text-xl animate-pulse">SCANNING...</h2>
            <div onclick="closeCamera()" class="absolute bottom-6 left-6 w-10 h-10 bg-white rounded-full flex items-center justify-center shadow-lg text-amber-600"><i class="fa-solid fa-arrow-left"></i></div>
            <button onclick="alert('Evidence Captured!')" class="alert-btn">Report Discrepancy</button>
        </div>
    </div>

    <section class="slim-slider">
        <div class="slide-track" id="product-slider">
            <div class="text-[10px] p-5 text-amber-900">Neman kaya daga Wolay Store...</div>
        </div>
    </section>

    <main class="chat-space" id="chat">
        <div class="bubble v-bubble">Sannu abokina! Ina fatan kayan sun iso lafiya.</div>
    </main>

    <footer class="bottom-nav">
        <div onclick="openCamera()" class="gold-trigger"><i class="fa-solid fa-camera"></i></div>
        <div class="input-pill">
            <textarea id="userInput" placeholder="Rubuta sakonku a nan..." rows="1" oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'"></textarea>
            <button onclick="sendMessage()" class="text-black text-xl ml-2 mb-1"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, child, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDJfUePiQV5R1YAcnq-zvfd3ty4lbzDs1M",
            authDomain: "global-market-admin.firebaseapp.com",
            databaseURL: "https://global-market-admin-default-rtdb.firebaseio.com",
            projectId: "global-market-admin",
            storageBucket: "global-market-admin.firebasestorage.app",
            appId: "1:259715265619:web:313919773f57cc5fb9c2a6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // GYARA: Mun inganta yadda yake kiran folder din 'Wolay Store'
        function loadProducts() {
            const track = document.getElementById('product-slider');
            // Muna kiran asalin hanyar yadda take a Screenshot dinka
            const productsRef = ref(db, 'vendors/vendor_001/Wolay Store');

            onValue(productsRef, (snapshot) => {
                const data = snapshot.val();
                
                if (data) {
                    // Idan "Wolay Store" kanta String ce fanko (kamar yadda yake a hoton Firebase), wannan zai kare code din daga tsayawa
                    if (typeof data !== 'object') {
                        track.innerHTML = '<div class="text-[10px] p-5">Folder tana nan amma babu kaya a ciki.</div>';
                        return;
                    }

                    const productList = Object.values(data).filter(p => p && p.img);
                    
                    if(productList.length > 0) {
                        const doubleList = [...productList, ...productList];
                        track.innerHTML = doubleList.map(p => `
                            <div class="slide-card" onclick="pick('${p.name || 'Product'}', '${p.img}')">
                                <img src="${p.img}" onerror="this.src='https://via.placeholder.com/140x85?text=Hoto+Baya+Aiki'">
                            </div>
                        `).join('');
                    } else {
                        track.innerHTML = '<div class="text-[10px] p-5">Babu hotuna a cikin Wolay Store.</div>';
                    }
                } else {
                    track.innerHTML = '<div class="text-[10px] p-5">Ba a samu Wolay Store a Database ba.</div>';
                }
            }, (error) => {
                console.error(error);
                track.innerHTML = '<div class="text-[10px] p-5">Matsalar Database: ' + error.message + '</div>';
            });
        }

        window.addEventListener('DOMContentLoaded', () => {
            loadChatHistory();
            loadProducts();
        });

        // Saka wadannan a 'window' domin sauran script din ya gansu
        window.sendMessage = function() {
            let input = document.getElementById('userInput');
            if(input.value.trim() !== "") {
                let text = input.value.replace(/\n/g, '<br>');
                document.getElementById('chat').innerHTML += `<div class="bubble u-bubble">${text}</div>`;
                saveChat('text', text);
                input.value = ""; 
                document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
            }
        };

        window.pick = function(name, img) {
            document.getElementById('chat').innerHTML += `<div class="bubble u-bubble"><div class="tag-box" style="background: rgba(212, 175, 55, 0.1); border-radius: 8px; padding: 5px; margin-bottom: 5px; display: flex; align-items: center; gap: 8px; border-left: 3px solid #D4AF37;"><img src="${img}" style="width:40px;height:40px;border-radius:6px;object-fit:cover;"><span class="text-[11px] font-bold text-amber-700">${name}</span></div>Ina son wannan kayan...</div>`;
            saveChat('pick', name, img);
            document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
        };
    </script>

    <script>
        function openCamera() { document.getElementById('truth-gate').style.display = 'flex'; }
        function closeCamera() { document.getElementById('truth-gate').style.display = 'none'; }
        
        function saveChat(type, content, extra = null) {
            let history = JSON.parse(localStorage.getItem('infinity_chat')) || [];
            history.push({ type, content, extra });
            localStorage.setItem('infinity_chat', JSON.stringify(history));
        }

        function loadChatHistory() {
            let history = JSON.parse(localStorage.getItem('infinity_chat')) || [];
            let chat = document.getElementById('chat');
            history.forEach(msg => {
                if(msg.type === 'text') {
                    chat.innerHTML += `<div class="bubble u-bubble">${msg.content}</div>`;
                } else if(msg.type === 'pick') {
                    chat.innerHTML += `<div class="bubble u-bubble"><div class="tag-box" style="background: rgba(212, 175, 55, 0.1); border-radius: 8px; padding: 5px; margin-bottom: 5px; display: flex; align-items: center; gap: 8px; border-left: 3px solid #D4AF37;"><img src="${msg.extra}" style="width:40px;height:40px;border-radius:6px;object-fit:cover;"><span class="text-[11px] font-bold text-amber-700">${msg.content}</span></div>Ina son wannan...</div>`;
                }
            });
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
