<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infinity Luxury Final Build</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400;600&display=swap');

        body {
            background: #E3DAC9; 
            font-family: 'Outfit', sans-serif;
            height: 100dvh; overflow: hidden;
            display: flex; flex-direction: column; margin: 0;
            position: fixed; width: 100%;
        }

        .slim-slider {
            height: 110px; background: #E3DAC9; overflow: hidden;
            position: relative; border-bottom: 1px solid rgba(212, 175, 55, 0.2); flex-shrink: 0;
        }
        .slide-track { display: flex; width: max-content; animation: scroll 40s linear infinite; height: 100%; align-items: center; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        
        .slide-card { 
            width: 140px; height: 85px; margin: 0 10px; border-radius: 12px; overflow: hidden; flex-shrink: 0; 
            border: 1px solid rgba(212, 175, 55, 0.4);
            background: #FDF5E6;
        }
        .slide-card img { width: 100%; height: 100%; object-fit: cover; }

        .chat-space { flex: 1; padding: 15px; overflow-y: auto; scrollbar-width: none; padding-bottom: 140px; }
        .bubble { max-width: 82%; padding: 11px 15px; margin-bottom: 12px; font-size: 14.5px; line-height: 1.4; position: relative; }
        .v-bubble { background: #1A0F0D; color: #D4AF37; border-radius: 4px 18px 18px 18px; border-left: 5px solid #FFD700; }
        .u-bubble { background: #FFFFFF; color: #333; border-radius: 18px 18px 4px 18px; margin-left: auto; border: 1px solid #EAEAEA; }

        #truth-gate { display: none; position: fixed; inset: 0; background: #fff; z-index: 5000; flex-direction: column; }
        .gate-half { flex: 1; position: relative; margin: 12px; border-radius: 35px; overflow: hidden; }

        /* GYARAN TYPING BAR HEIGHT */
        .bottom-nav { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: #E3DAC9; padding: 10px 10px 30px; 
            display: flex; align-items: center; gap: 8px; z-index: 1000; 
        }
        
        .input-container {
            flex: 1; background: white; border-radius: 30px;
            display: flex; align-items: center; padding: 0 15px;
            height: 50px; /* Ya yi daidai da icon din gefe */
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .icon-btn { color: #888; font-size: 18px; cursor: pointer; padding: 5px; }

        #userInput {
            flex: 1; background: transparent; border: none; outline: none;
            padding: 5px; font-size: 16px; font-family: 'Outfit', sans-serif;
            resize: none; height: 24px;
        }

        .action-circle {
            width: 50px; height: 50px; background: #1A0F0D; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: #D4AF37; font-size: 20px; flex-shrink: 0; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="truth-gate">
        <div class="gate-half" style="border: 1px solid #eee;">
            <img src="https://images.unsplash.com/photo-1590736704728-f4730bb30770?w=800" class="w-full h-full object-cover">
        </div>
        <div class="gate-half bg-gray-50 flex flex-col items-center justify-center border-t-8 border-amber-500">
            <h2 class="text-gray-300 font-black italic text-xl animate-pulse">SCANNING...</h2>
            <div onclick="closeCamera()" class="absolute bottom-6 left-6 w-10 h-10 bg-white rounded-full flex items-center justify-center shadow-lg text-amber-600"><i class="fa-solid fa-arrow-left"></i></div>
            <button onclick="alert('Evidence Captured!')" style="background:#E11D48; color:white; padding:12px; border-radius:15px; font-size:11px;">Report Discrepancy</button>
        </div>
    </div>

    <section class="slim-slider">
        <div class="slide-track" id="product-slider">
            <div class="text-[10px] p-5 text-amber-900">Neman kaya...</div>
        </div>
    </section>

    <main class="chat-space" id="chat">
        <div class="bubble v-bubble">Sannu abokina! Ina fatan kayan sun iso lafiya.</div>
    </main>

    <footer class="bottom-nav">
        <div class="input-container">
            <label for="file-upload" class="icon-btn"><i class="fa-regular fa-image"></i></label>
            <input id="file-upload" type="file" accept="image/*" style="display:none;" onchange="handleImage(this)">
            
            <textarea id="userInput" rows="1" oninput="toggleButtons(this)"></textarea>
            
            <div class="icon-btn" onclick="openCamera()"><i class="fa-solid fa-wand-magic-sparkles"></i></div>
        </div>
        
        <div id="actionBtn" class="action-circle" onclick="handleAction()">
            <i id="actionIcon" class="fa-solid fa-microphone"></i>
        </div>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDJfUePiQV5R1YAcnq-zvfd3ty4lbzDs1M",
            authDomain: "global-market-admin.firebaseapp.com",
            projectId: "global-market-admin",
            storageBucket: "global-market-admin.firebasestorage.app",
            appId: "1:259715265619:web:313919773f57cc5fb9c2a6"
        };

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();

        async function loadFirestoreProducts() {
            const track = document.getElementById('product-slider');
            try {
                const snapshot = await db.collection('products').get();
                const productList = [];
                snapshot.forEach(doc => { if (doc.data().img) productList.push(doc.data()); });
                if (productList.length > 0) {
                    const doubleList = [...productList, ...productList];
                    track.innerHTML = doubleList.map(p => `
                        <div class="slide-card" onclick="pick('${p.name || 'Luxury'}', '${p.img}')">
                            <img src="${p.img}">
                        </div>
                    `).join('');
                }
            } catch (err) {}
        }

        function toggleButtons(el) {
            const icon = document.getElementById('actionIcon');
            if (el.value.trim() !== "") {
                icon.className = "fa-solid fa-paper-plane";
            } else {
                icon.className = "fa-solid fa-microphone";
            }
        }

        function handleAction() {
            const icon = document.getElementById('actionIcon');
            if (icon.classList.contains('fa-paper-plane')) { sendMessage(); }
        }

        function sendMessage() {
            let input = document.getElementById('userInput');
            if(input.value.trim() !== "") {
                let text = input.value;
                document.getElementById('chat').innerHTML += `<div class="bubble u-bubble">${text}</div>`;
                saveChat('text', text);
                input.value = ""; toggleButtons(input);
                document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
            }
        }

        function handleImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('chat').innerHTML += `<div class="bubble u-bubble"><img src="${e.target.result}" style="border-radius:10px; max-width:200px;"></div>`;
                    saveChat('image', e.target.result);
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function pick(name, img) {
            document.getElementById('chat').innerHTML += `<div class="bubble u-bubble"><div style="background:rgba(212,175,55,0.1);padding:5px;border-radius:8px;display:flex;align-items:center;gap:8px;border-left:3px solid #D4AF37;margin-bottom:5px;"><img src="${img}" style="width:40px;height:40px;border-radius:6px;object-fit:cover;"><span style="font-size:11px;font-weight:bold;color:#B8860B;">${name}</span></div>Ina son wannan...</div>`;
            saveChat('pick', name, img);
            document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
        }

        function openCamera() { document.getElementById('truth-gate').style.display = 'flex'; }
        function closeCamera() { document.getElementById('truth-gate').style.display = 'none'; }
        
        function saveChat(type, content, extra = null) {
            let history = JSON.parse(localStorage.getItem('infinity_chat')) || [];
            history.push({ type, content, extra });
            localStorage.setItem('infinity_chat', JSON.stringify(history));
        }

        document.addEventListener('DOMContentLoaded', () => {
            let history = JSON.parse(localStorage.getItem('infinity_chat')) || [];
            let chat = document.getElementById('chat');
            history.forEach(msg => {
                if(msg.type === 'text') chat.innerHTML += `<div class="bubble u-bubble">${msg.content}</div>`;
                else if(msg.type === 'image') chat.innerHTML += `<div class="bubble u-bubble"><img src="${msg.content}" style="border-radius:10px; max-width:200px;"></div>`;
                else if(msg.type === 'pick') chat.innerHTML += `<div class="bubble u-bubble"><div style="background:rgba(212,175,55,0.1);padding:5px;border-radius:8px;display:flex;align-items:center;gap:8px;border-left:3px solid #D4AF37;margin-bottom:5px;"><img src="${msg.extra}" style="width:40px;height:40px;border-radius:6px;object-fit:cover;"><span style="font-size:11px;font-weight:bold;color:#B8860B;">${msg.content}</span></div>Ina son wannan...</div>`;
            });
            chat.scrollTop = chat.scrollHeight;
            loadFirestoreProducts();
        });
    </script>
</body>
</html>
