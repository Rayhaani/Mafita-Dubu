<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categories | Mafita Dubu</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Quicksand:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        :root { --gold: #FB7701; --milk: #FFFDD0; }
        body { font-family: 'Quicksand', sans-serif; background-color: var(--milk); margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .search-wrapper { width: 100%; display: flex; justify-content: center; position: sticky; top: 0; z-index: 8000; background-color: var(--milk); padding: 4px 12px 10px 12px; }
        .titan-search-engine { position: relative; width: 100%; height: 42px; display: flex; align-items: center; background: transparent; border-radius: 25px; padding-left: 15px; border: 1.5px solid #000; }
        .titan-input { flex: 1; background: transparent; border: none; outline: none; color: #333; font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 500; }
        .search-trigger-pill { background: #000; height: calc(100% - 4px); padding: 0 18px; border-radius: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; margin-right: 2px; }
        .search-trigger-pill i { color: #fff; font-size: 16px; }

        .categories-container { display: flex; flex: 1; overflow: hidden; }
        
        .sidebar-left { width: 85px; background: rgba(0,0,0,0.03); overflow-y: auto; height: calc(100vh - 100px); border-right: 0.5px solid rgba(0,0,0,0.05); padding-bottom: 64px !important; }
        .sidebar-left::-webkit-scrollbar { display: none; }
        .cat-btn { width: 100%; padding: 12px 6px; font-size: 11px; font-weight: 600; text-align: left; color: #555; cursor: pointer; }
        .cat-btn.active { background: var(--milk); color: #000; font-weight: 800; border-left: 3.5px solid #000; }
        .side-dropdown { display: none; background: var(--milk); }
        .side-dropdown.open { display: block; }
        .side-sub-item { padding: 8px 10px; font-size: 10px; color: #888; text-align: left; border-bottom: 0.2px solid rgba(0,0,0,0.02); cursor: pointer; }

        .content-right { flex: 1; background: var(--milk); overflow-y: auto; padding: 10px; padding-bottom: 100px !important; }
        .content-right::-webkit-scrollbar { display: none; }
        .section-header { font-size: 14px; font-weight: 800; margin: 15px 0 10px 0; color: #111; display: flex; justify-content: space-between; align-items: center; }

        /* SHOP BY CATEGORY (CIRCLES) */
        .circle-row { display: flex; flex-wrap: wrap; justify-content: flex-start; gap: 4%; width: 100%; }
        .circle-item { width: 30%; text-align: center; margin-bottom: 18px; cursor: pointer; }
        .img-circle-box { width: 80px; height: 80px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden; margin: 0 auto 6px auto; border: 1px solid rgba(0,0,0,0.05); }
        .img-circle-box img { width: 100%; height: 100%; object-fit: cover; }
        .circle-item p { font-size: 10px; font-weight: 700; color: #222; margin: 0; }

        /* TRENDING ITEMS */
        .trending-row { display: flex; flex-wrap: wrap; justify-content: space-between; width: 100%; }
        .trend-item { width: 48.5%; background: #fff; margin-bottom: 15px; border-radius: 12px; overflow: hidden; border: 0.5px solid rgba(0,0,0,0.05); }
        .trend-img-box { width: 100%; aspect-ratio: 1/1.2; background: #f5f5f5; position: relative; }
        .trend-img-box img { width: 100%; height: 100%; object-fit: cover; }
        .cart-icon { position: absolute; bottom: 8px; right: 8px; background: #fff; width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        .trend-meta { padding: 8px; }
        .star-text { font-size: 9px; color: #666; font-weight: 600; }
        .price-bold { font-size: 14px; font-weight: 800; color: #000; }

        .depth-dock { position: fixed; bottom: 0; left: 0; right: 0; height: 50px; background: var(--milk); display: flex; justify-content: space-around; align-items: center; border-top: 0.5px solid rgba(0,0,0,0.08); z-index: 9999; }
        .depth-item { display: flex; flex-direction: column; align-items: center; justify-content: center; color: #555; width: 20%; }
        .depth-item.active { color: #000; }
        .depth-label { font-size: 9px; font-weight: 700; }
    </style>
</head>
<body>

    <header class="search-wrapper">
        <div class="titan-search-engine">
            <input type="text" placeholder="Nemi komai a Mafita Dubu..." class="titan-input">
            <div class="search-trigger-pill"><i class="fa-solid fa-magnifying-glass"></i></div>
        </div>
    </header>

    <div class="categories-container">
        <aside class="sidebar-left" id="dynamic-sidebar">
            <!-- Sidebar categories za su fito a nan -->
        </aside>

        <main class="content-right">
            <div id="shop-by-cat-section">
                <div class="section-header"><span>Shop by category</span></div>
                <div class="circle-row" id="category-circles">
                    <!-- Hotuna masu zagaye za su fito a nan -->
                </div>
            </div>

            <div class="section-header"><span id="section-title">Trending items</span></div>
            <div class="trending-row" id="product-display">
                <!-- Products za su fito a nan -->
            </div>
        </main>
    </div>

    <nav class="depth-dock">
        <div class="depth-item" onclick="location.href='index.html'"><i class="fa-solid fa-house"></i><span class="depth-label">Home</span></div>
        <div class="depth-item active"><i class="fa-solid fa-list-ul"></i><span class="depth-label">Categories</span></div>
        <div class="depth-item"><i class="fa-solid fa-comment-dots"></i><span class="depth-label">Messages</span></div>
        <div class="depth-item"><i class="fa-solid fa-basket-shopping"></i><span class="depth-label">Transactions</span></div>
        <div class="depth-item"><i class="fa-solid fa-user"></i><span class="depth-label">You</span></div>
    </nav>

    <script>
        // ======= SAKA FIREBASE CONFIG DIN KA A NAN =======
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 1. DYNAMIC SIDEBAR & CIRCLES
        function loadAppLayout() {
            db.collection('app_settings').doc('categories').onSnapshot((doc) => {
                if (!doc.exists) return;
                const data = doc.data();
                const sidebar = document.getElementById('dynamic-sidebar');
                const circles = document.getElementById('category-circles');
                
                sidebar.innerHTML = '';
                circles.innerHTML = '';

                // Jera su, sanya Vendor/Marketplace a karshe
                const keys = Object.keys(data).sort((a, b) => 
                    (a.toLowerCase() === 'vendor' || a.toLowerCase() === 'marketplace') ? 1 : -1
                );

                keys.forEach(catName => {
                    const isMarketplace = (catName.toLowerCase() === 'vendor' || catName.toLowerCase() === 'marketplace');
                    
                    // Gina Sidebar
                    const group = document.createElement('div');
                    group.className = 'cat-group';
                    let subItemsHtml = '';
                    
                    const subData = data[catName];
                    if (typeof subData === 'object' && !Array.isArray(subData)) {
                        Object.keys(subData).forEach(subKey => {
                            // Sub-header (kamar Textiles)
                            subItemsHtml += `<div class="side-sub-item font-bold text-black bg-gray-50">${subKey}</div>`;
                            if (Array.isArray(subData[subKey])) {
                                subData[subKey].forEach(item => {
                                    subItemsHtml += `<div class="side-sub-item" onclick="filterBy('${item}')">${item}</div>`;
                                    
                                    // Idan Marketplace ne, saka shi a "Shop by Category"
                                    if (isMarketplace) {
                                        circles.innerHTML += `
                                            <div class="circle-item" onclick="filterBy('${item}')">
                                                <div class="img-circle-box"><img src="https://via.placeholder.com/80?text=${item}"></div>
                                                <p>${item}</p>
                                            </div>`;
                                    }
                                });
                            }
                        });
                    }

                    group.innerHTML = `
                        <div class="cat-btn ${isMarketplace ? 'active' : ''}" onclick="toggleSidebarMenu(this)">${catName}</div>
                        <div class="side-dropdown ${isMarketplace ? 'open' : ''}">${subItemsHtml}</div>
                    `;
                    sidebar.appendChild(group);
                });
            });
        }

        // 2. LOAD PRODUCTS
        function filterBy(categoryName = null) {
            let query = db.collection('products');
            if (categoryName) {
                query = query.where('category', '==', categoryName);
                document.getElementById('section-title').innerText = categoryName;
                document.getElementById('shop-by-cat-section').style.display = 'none';
            } else {
                query = query.limit(12);
                document.getElementById('shop-by-cat-section').style.display = 'block';
            }

            query.onSnapshot((snap) => {
                const display = document.getElementById('product-display');
                display.innerHTML = '';
                snap.forEach(doc => {
                    const p = doc.data();
                    display.innerHTML += `
                        <div class="trend-item">
                            <div class="trend-img-box">
                                <img src="${p.imageUrl || 'https://via.placeholder.com/150'}">
                                <div class="cart-icon"><i class="fa-solid fa-cart-shopping"></i></div>
                            </div>
                            <div class="trend-meta">
                                <div class="star-text"><i class="fa-solid fa-star text-[8px]"></i> 4.8 | ${p.sold || 0} sold</div>
                                <div class="price-bold">₦${p.price || '0'}</div>
                            </div>
                        </div>`;
                });
            });
        }

        function toggleSidebarMenu(btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.side-dropdown').forEach(d => d.classList.remove('open'));
            btn.classList.add('active');
            btn.nextElementSibling.classList.add('open');
        }

        loadAppLayout();
        filterBy(); // Load trending first
    </script>
</body>
</html>
