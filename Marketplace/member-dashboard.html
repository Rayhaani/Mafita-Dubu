<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mafita Dubu - Member Dashboard</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Quicksand:wght@300;400;500;600;700;800&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --milk: #FFFDD0;
            --deep-gold: #b58900;
            --gold-glow: #D4AF37;
            --sand-color: #C2B280;
            --void-bg: #050505;
            --neon-gold: #D4AF37;
            --universal-gap: 8px;
        }

        /* --- MAGNETIC SAND SPLASH --- */
        #welcome-screen {
            position: fixed;
            inset: 0;
            background: var(--void-bg);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: all 1.5s cubic-bezier(0.6, -0.28, 0.735, 0.045);
        }

        .sand-text {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(3rem, 15vw, 6.5rem);
            font-weight: 700;
            color: transparent;
            -webkit-text-stroke: 1px rgba(194, 178, 128, 0.5);
            position: relative;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            animation: assemble 4s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }

        .sand-text::after {
            content: 'SADIQ';
            position: absolute;
            left: 0; top: 0; width: 100%; height: 100%;
            color: var(--sand-color);
            text-shadow: 0 0 20px var(--sand-color);
            mask-image: linear-gradient(to right, transparent, black, transparent);
            mask-size: 200% 100%;
            animation: sandWave 3s linear infinite;
        }

        @keyframes assemble {
            0% { letter-spacing: 2em; opacity: 0; filter: blur(20px); transform: scale(1.5); }
            100% { letter-spacing: 0.2em; opacity: 1; filter: blur(0px); transform: scale(1); }
        }

        @keyframes sandWave {
            0% { mask-position: 200% 0%; }
            100% { mask-position: -200% 0%; }
        }

        .sand-line {
            height: 2px;
            background: linear-gradient(to right, transparent, var(--sand-color), transparent);
            width: 100%; margin-top: 10px;
        }

        .screen-exit {
            filter: opacity(0) saturate(0) blur(40px);
            transform: scale(0.8);
            pointer-events: none;
        }
        
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--milk);
            margin: 0;
            overflow-x: hidden;
        }

        #main-content {
            opacity: 0;
            transform: scale(0.98);
            transition: all 1s ease-out;
            background-color: var(--milk);
            padding-bottom: 80px; 
        }

        #main-content.show {
            opacity: 1;
            transform: scale(1);
        }

        /* --- TITAN SEARCH --- */
        .search-wrapper {
            width: 100%;
            padding: 0; 
            display: flex;
            justify-content: center;
        }

        .titan-search-engine {
            position: relative;
            width: 100%;
            max-width: 1200px;
            height: 60px;
            display: flex;
            align-items: center;
            background: #0d0d0d;
            border-radius: 0 0 50px 50px;
            padding: 0 25px;
            transition: all 0.4s ease;
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-top: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .titan-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-family: 'Syncopate', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .titan-input::placeholder {
            color: rgba(212, 175, 55, 0.3);
            font-size: 10px;
        }

        .camera-icon {
            color: #D4AF37;
            font-size: 18px;
            margin-left: 15px;
            cursor: pointer;
            transition: 0.3s;
            opacity: 0.8;
        }

        .camera-icon:hover {
            opacity: 1;
            transform: scale(1.1);
            filter: drop-shadow(0 0 8px #D4AF37);
        }

        .scan-line {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            width: 0%;
            background: linear-gradient(90deg, transparent, #D4AF37, #fff, #D4AF37, transparent);
            transition: width 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .titan-input:focus ~ .scan-line {
            width: 100%;
        }

        /* --- STATIC BOXES SYSTEM (8 BOXES) --- */
        .static-box {
            position: relative;
            overflow: hidden;
            height: 208px;
            border-radius: 2.5rem;
            background: #0c0c0c;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        @keyframes photo-reveal {
            0%, 18% { opacity: 1; z-index: 30; visibility: visible; } 
            23%, 25% { opacity: 0; z-index: 5; visibility: hidden; }
            26%, 100% { opacity: 0; z-index: 5; visibility: hidden; } 
        }

        .img-container { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; animation: photo-reveal 16s infinite linear; }
        .img-1 { animation-delay: 0s !important; }
        .img-2 { animation-delay: 4s !important; }
        .img-3 { animation-delay: 8s !important; }
        .img-4 { animation-delay: 12s !important; }

        .box-title {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(90deg, #d400ff, #00d2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            font-size: 14px;
            text-transform: capitalize;
        }

        .box-overlay { position: absolute; inset: 0; z-index: 35; background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 60%); pointer-events: none; }

        .royal-seal {
            background: radial-gradient(circle, #ffd700 0%, #b8860b 100%);
            border: 1.5px solid #ffffff;
            border-radius: 50%;
            width: 28px; height: 28px;
            display: flex; align-items: center; justify-content: center;
            margin-top: 8px;
        }

        .depth-dock { 
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 70px; background: var(--milk); 
            display: flex; justify-content: space-around; align-items: center; padding: 0 10px; 
            box-shadow: 0 -5px 25px rgba(0,0,0,0.08); 
            border-top: 1px solid rgba(212, 175, 55, 0.2);
            z-index: 1000;
        }

        .depth-item { 
            width: 45px; height: 45px; background: var(--milk); 
            border-radius: 12px; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; box-shadow: 3px 3px 8px rgba(0,0,0,0.08); color: #777; transition: 0.2s; 
        }

        .depth-item.active { box-shadow: inset 3px 3px 8px rgba(0,0,0,0.1); color: var(--neon-gold); }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <div class="text-center">
            <h1 class="sand-text">SADIQ</h1>
            <div class="sand-line"></div>
            <p class="text-[8px] tracking-[1em] text-white/30 mt-6 uppercase">Reconstructing Protocol</p>
        </div>
    </div>

    <div id="main-content">
        <div class="search-wrapper">
            <div class="titan-search-engine">
                <input type="text" placeholder="NEMI KOMAI A MAFITA DUBU..." class="titan-input">
                <i class="fa-solid fa-camera camera-icon"></i>
                <div class="scan-line"></div>
            </div>
        </div>

        <main class="max-w-7xl mx-auto px-6 mt-8">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6 pb-10">
                
                <!-- 1. Kasuwa -->
                <a href="Marketplace/market.html" class="static-box block">
                    <div class="absolute inset-0 flex flex-col items-center justify-center z-[40] text-center">
                        <h4 class="box-title text-white">Sashen 'Yan Kasuwa</h4> 
                        <div class="royal-seal"><i class="fa-solid fa-bolt text-white text-[10px]"></i></div>
                    </div>
                    <div class="img-container img-1"><img src="https://i.postimg.cc/02LNsdFH/istockphoto-2196140224-612x612.jpg" class="w-full h-full object-cover"><div class="box-overlay"></div></div>
                    <div class="img-container img-2"><img src="https://i.postimg.cc/fRnMFW0w/kano-market.jpg" class="w-full h-full object-cover"><div class="box-overlay"></div></div>
                    <div class="img-container img-3"><img src="https://i.postimg.cc/8s8gqwsT/348s.jpg" class="w-full h-full object-cover"><div class="box-overlay"></div></div>
                    <div class="img-container img-4"><img src="https://images.unsplash.com/photo-1578916171728-46686eac8d58?q=80&w=500" class="w-full h-full object-cover"><div class="box-overlay"></div></div>
                </a>

                <!-- 2. Gwanjo -->
                <a href="Used Hub/index.html" class="static-box block">
                    <div class="absolute inset-0 flex flex-col items-center justify-center z-[40] text-center">
                        <h4 class="box-title text-white">Kasuwar Gwanjo</h4> 
                        <div class="royal-seal"><i class="fa-solid fa-tags text-white text-[10px]"></i></div>
                    </div>
                    <div class="img-container img-1"><img src="https://images.unsplash.com/photo-1489987707025-afc232f7ea0f?q=80&w=400" class="w-full h-full object-cover"><div class="box-overlay"></div></div>
                    <div class="img-container img-2"><img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400" class="w-full h-full object-cover"><div class="box-overlay"></div></div>
                    <div class="img-container img-3"><img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400" class="w-full h-full object-cover"><div class="box-overlay"></div></div>
                    <div class="img-container img-4"><img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400" class="w-full h-full object-cover"><div class="box-overlay"></div></div>
                </a>

                <!-- 3. Lafiya -->
                <a href="Health Hub/health.html" class="static-box block">
                    <div class="absolute inset-0 flex flex-col items-center justify-center z-[40] text-center">
                        <h4 class="box-title text-white">Kiwon Lafiya</h4>
                        <div class="royal-seal"><i class="fa-solid fa-heart-pulse text-white text-[10px]"></i></div>
                    </div>
                    <div class="img-container img-1"><img src="https://i.postimg.cc/Y0P2spNJ/image-1.jpg" class="w-full h-full object-cover"><div class="box-overlay"></div></div>
                    <div class="img-container img-2"><img src="https://i.postimg.cc/7YCZT2wP/image-3.jpg" class="w-full h-full object-cover"><div class="box-overlay"></div></div>
                </a>

                <!-- 4. Sana'a -->
                <a href="Daular Sana'a/index.html" class="static-box block">
                    <div class="absolute inset-0 flex flex-col items-center justify-center z-[40] text-center">
                        <h4 class="box-title text-white">Koyon Sana'a</h4> 
                        <div class="royal-seal"><i class="fa-solid fa-hammer text-white text-[10px]"></i></div>
                    </div>
                    <div class="img-container img-1"><img src="https://i.postimg.cc/j2V5zhch/IMG-20260122-WA0044(1).jpg" class="w-full h-full object-cover"><div class="box-overlay"></div></div>
                </a>

                <!-- 5. Aure -->
                <a href="Marriage Hub/marriage-hub.html" class="static-box block">
                    <div class="absolute inset-0 flex flex-col items-center justify-center z-[40] text-center">
                        <h4 class="box-title text-pink-500">Dandalin Aure</h4> 
                        <div class="royal-seal" style="background: radial-gradient(circle, #ff69b4 0%, #c71585 100%);"><i class="fa-solid fa-heart text-white text-[10px]"></i></div>
                    </div>   
                    <div class="img-container img-1"><img src="https://i.postimg.cc/pT5n7Xh8/wedding-1.jpg" class="w-full h-full object-cover"><div class="box-overlay"></div></div>
                    <div class="img-container img-2"><img src="https://i.postimg.cc/mD8N1V7k/wedding-2.jpg" class="w-full h-full object-cover"><div class="box-overlay"></div></div>
                </a>

                <!-- 6. Mafita Hub -->
                <div class="static-box">
                    <div class="absolute inset-0 flex flex-col items-center justify-center z-[40] text-center">
                        <h4 class="box-title text-yellow-500">Mafita Hub</h4> 
                        <div class="royal-seal"><i class="fa-solid fa-star text-white text-[10px]"></i></div>
                    </div>
                    <div class="img-container img-1"><img src="https://i.postimg.cc/GtRJvx6H/IMG-20260123-WA0031(1).jpg" class="w-full h-full object-cover"><div class="box-overlay"></div></div>
                </div>

                <!-- 7. Experts -->
                <div class="static-box">
                    <div class="absolute inset-0 flex flex-col items-center justify-center z-[40] text-center">
                        <h4 class="box-title text-purple-500">Kwararru</h4> 
                        <div class="royal-seal"><i class="fa-solid fa-user-gear text-white text-[10px]"></i></div>
                    </div>
                    <div class="img-container img-1"><img src="https://i.postimg.cc/JzcXcxTS/IMG-20260124-WA0029.jpg" class="w-full h-full object-cover"><div class="box-overlay"></div></div>
                </div>

                <!-- 8. Girki -->
                <div class="static-box">
                    <div class="absolute inset-0 flex flex-col items-center justify-center z-[40] text-center">
                        <h4 class="box-title text-orange-500">Sashen Girki</h4> 
                        <div class="royal-seal"><i class="fa-solid fa-bowl-food text-white text-[10px]"></i></div>
                    </div>
                    <div class="img-container img-1"><img src="https://images.unsplash.com/photo-1556910103-1c02745aae4d?w=400" class="w-full h-full object-cover"><div class="box-overlay"></div></div>
                </div>

            </div>
        </main>

        <nav class="depth-dock">
            <div class="depth-item active" onclick="activate(this)"><i class="fa-solid fa-house"></i></div>
            <div class="depth-item" onclick="activate(this)"><i class="fa-solid fa-chart-pie"></i></div>
            <div class="depth-item" onclick="activate(this)"><i class="fa-solid fa-basket-shopping"></i></div>
            <div class="depth-item" onclick="activate(this)"><i class="fa-solid fa-paper-plane"></i></div>
            <div class="depth-item" onclick="activate(this)"><i class="fa-solid fa-id-card-clip"></i></div>
        </nav>
    </div>

    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                const welcome = document.getElementById('welcome-screen');
                const main = document.getElementById('main-content');
                welcome.classList.add('screen-exit');
                setTimeout(() => {
                    welcome.style.display = 'none';
                    main.classList.add('show');
                }, 1500); 
            }, 5000); 
        });

        function activate(el) {
            document.querySelectorAll('.depth-item').forEach(item => item.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
                                                                                                                                                                                                        </html>
