<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mafita Dubu - Member Dashboard</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Quicksand:wght@300;400;500;600;700;800&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --milk: #FFFDD0;
            --deep-gold: #b58900;
            --gold-glow: #D4AF37;
            --sand-color: #C2B280;
            --void-bg: #050505;
            --neon-gold: #D4AF37;
            --universal-gap: 8px;
        }

        /* --- MAGNETIC SAND SPLASH --- */
        #welcome-screen {
            position: fixed;
            inset: 0;
            background: var(--void-bg);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: all 1.5s cubic-bezier(0.6, -0.28, 0.735, 0.045);
        }

        .sand-text {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(3rem, 15vw, 6.5rem);
            font-weight: 700;
            color: transparent;
            -webkit-text-stroke: 1px rgba(194, 178, 128, 0.5);
            position: relative;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            animation: assemble 4s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }

        .sand-text::after {
            content: 'SADIQ';
            position: absolute;
            left: 0; top: 0; width: 100%; height: 100%;
            color: var(--sand-color);
            text-shadow: 0 0 20px var(--sand-color);
            mask-image: linear-gradient(to right, transparent, black, transparent);
            mask-size: 200% 100%;
            animation: sandWave 3s linear infinite;
        }

        @keyframes assemble {
            0% { letter-spacing: 2em; opacity: 0; filter: blur(20px); transform: scale(1.5); }
            100% { letter-spacing: 0.2em; opacity: 1; filter: blur(0px); transform: scale(1); }
        }

        @keyframes sandWave {
            0% { mask-position: 200% 0%; }
            100% { mask-position: -200% 0%; }
        }

        .sand-line {
            height: 2px;
            background: linear-gradient(to right, transparent, var(--sand-color), transparent);
            width: 100%; margin-top: 10px;
        }

        .screen-exit {
            filter: opacity(0) saturate(0) blur(40px);
            transform: scale(0.8);
            pointer-events: none;
        }

        /* --- TICKER --- */
        .ticker-wrap {
            width: 100%;
            overflow: hidden;
            background: rgba(212, 175, 55, 0.1);
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            padding: 8px 0;
        }

        .ticker-move {
            display: inline-block;
            white-space: nowrap;
            padding-right: 100%;
            animation: ticker 25s linear infinite;
            /* ELITE FONT UPDATE */
            font-family: 'Syncopate', sans-serif;
            font-size: 9px;
            font-weight: 700;
            color: #b58900;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        @keyframes ticker {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }
        
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--milk);
            margin: 0;
            overflow-x: hidden;
        }

        #main-content {
            opacity: 0;
            transform: scale(0.98);
            transition: all 1s ease-out;
            background-color: var(--milk);
            /* Padding added to avoid content being hidden by fixed footer */
            padding-bottom: 80px; 
        }

        #main-content.show {
            opacity: 1;
            transform: scale(1);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, transparent, var(--gold-glow));
            animation: rotate 4s linear infinite;
            opacity: 0;
            transition: 0.5s;
            z-index: 0;
        }

        .glass-card:hover::before, .glass-card.active-prism::before { opacity: 1; }
        .glass-card > div, .glass-card > h3, .glass-card > p, .glass-card > button { position: relative; z-index: 1; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }

        .glass-card:hover {
            transform: scale(1.05) translateY(-5px);
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid var(--glow-color);
            box-shadow: 0 20px 40px var(--glow-shadow);
        }

        /* --- MELTING EFFECT --- */
        .melt-trigger {
            animation: meltEffect 1s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            pointer-events: none;
        }

        @keyframes meltEffect {
            0% { transform: translateY(0); filter: blur(0); opacity: 1; }
            100% { transform: translateY(100vh) scaleY(1.5); filter: blur(20px); opacity: 0; }
        }

        .card-kasuwa { --glow-color: #fbbf24; --glow-shadow: rgba(251, 191, 36, 0.2); }
        .card-used { --glow-color: #22c55e; --glow-shadow: rgba(34, 197, 94, 0.2); }
        .card-lafiya { --glow-color: #ef4444; --glow-shadow: rgba(239, 68, 68, 0.2); }
        .card-sanaa { --glow-color: #2563eb; --glow-shadow: rgba(37, 99, 235, 0.2); }
        .card-aure { --glow-color: #ec4899; --glow-shadow: rgba(236, 72, 153, 0.2); }
        .card-hub { --glow-color: #d4af37; --glow-shadow: rgba(212, 175, 55, 0.4); }
        .card-experts { --glow-color: #9333ea; --glow-shadow: rgba(147, 51, 234, 0.2); }
        .card-girki { --glow-color: #ea580c; --glow-shadow: rgba(234, 88, 12, 0.2); }

        .icon-gradient { background: linear-gradient(135deg, #fdfcfb 0%, #e2d1c3 100%); }

        /* --- FIXED FOOTER (NO SPACE) --- */
        .depth-dock { 
            position: fixed; /* Manne a waje guda */
            bottom: 0; /* Ya dube kasa radau */
            left: 0;
            right: 0;
            height: 70px; 
            background: var(--milk); 
            display: flex; 
            justify-content: space-around; 
            align-items: center; 
            padding: 0 10px; 
            box-shadow: 0 -5px 25px rgba(0,0,0,0.08); 
            border-top: 1px solid rgba(212, 175, 55, 0.2);
            z-index: 1000;
        }

        .depth-item { 
            position: relative; 
            width: 45px; 
            height: 45px; 
            background: var(--milk); 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            box-shadow: 3px 3px 8px rgba(0,0,0,0.08); 
            color: #777; 
            transition: 0.2s; 
        }

        .depth-item.active { box-shadow: inset 3px 3px 8px rgba(0,0,0,0.1); color: var(--neon-gold); }
    </style>
</head>
<body>

    <!-- MAGNETIC SAND SPLASH SCREEN -->
    <div id="welcome-screen">
        <div class="text-center">
            <h1 class="sand-text">SADIQ</h1>
            <div class="sand-line"></div>
            <p class="text-[8px] tracking-[1em] text-white/30 mt-6 uppercase">Reconstructing Protocol</p>
        </div>
    </div>

    <!-- MAIN DASHBOARD CONTENT -->
    <div id="main-content">
        
     <!-- THE PURE FUTURISTIC SEARCH HUB -->
<div class="search-wrapper">
    <div class="neo-search-engine">
        <!-- Search Icon -->
        <i class="fa-solid fa-magnifying-glass main-glass"></i>
        
        <!-- Input Field -->
        <input type="text" placeholder="Nemi komai a Mafita Dubu..." class="futuristic-input">

        <!-- Tech Icons (Camera & Voice) -->
        <div class="input-actions">
            <button class="action-btn camera-trigger" title="Visual Search">
                <i class="fa-solid fa-camera-retro"></i>
            </button>
            <button class="action-btn mic-trigger" title="Voice Search">
                <i class="fa-solid fa-microphone-lines"></i>
            </button>
        </div>

        <!-- Scanning Beam Animation -->
        <div class="beam-light"></div>
    </div>
</div>

<style>
    .search-wrapper {
        width: 100%;
        padding: 20px;
        display: flex;
        justify-content: center;
        /* Yana amfani da background din shafinka kai tsaye */
    }

    .neo-search-engine {
        position: relative;
        width: 100%;
        max-width: 600px;
        height: 55px;
        display: flex;
        align-items: center;
        background: rgba(255, 255, 255, 0.03); /* Transparent */
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(212, 175, 55, 0.3);
        border-radius: 50px;
        padding: 0 20px;
        transition: all 0.4s ease;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
    }

    /* Pulse Gold Glow lokacin da ake bincike */
    .neo-search-engine:focus-within {
        border-color: #D4AF37;
        box-shadow: 0 0 25px rgba(212, 175, 55, 0.3);
        background: rgba(255, 255, 255, 0.07);
        transform: translateY(-2px);
    }

    .main-glass {
        color: #D4AF37;
        font-size: 18px;
        margin-right: 15px;
        filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.5));
    }

    .futuristic-input {
        flex: 1;
        background: transparent;
        border: none;
        outline: none;
        color: #fff;
        font-family: 'Quicksand', sans-serif;
        font-size: 15px;
        font-weight: 500;
        letter-spacing: 0.5px;
    }

    .futuristic-input::placeholder {
        color: rgba(212, 175, 55, 0.4);
        text-transform: uppercase;
        font-size: 11px;
        letter-spacing: 2px;
    }

    .input-actions {
        display: flex;
        gap: 15px;
        align-items: center;
        border-left: 1px solid rgba(212, 175, 55, 0.2);
        padding-left: 15px;
    }

    .action-btn {
        background: transparent;
        border: none;
        color: #D4AF37;
        font-size: 18px;
        cursor: pointer;
        transition: 0.3s;
        opacity: 0.7;
    }

    .action-btn:hover {
        opacity: 1;
        transform: scale(1.2);
        filter: drop-shadow(0 0 8px #D4AF37);
    }

    /* Scanning Beam - Yana wucewa akai-akai */
    .beam-light {
        position: absolute;
        top: 0;
        left: -100%;
        width: 40%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.15), transparent);
        animation: beam-swipe 4s infinite linear;
        pointer-events: none;
    }

    @keyframes beam-swipe {
        0% { left: -100%; }
        100% { left: 150%; }
    }

    /* Camera Icon Blinking Effect (Attractive) */
    .camera-trigger {
        animation: cam-pulse 2s infinite alternate;
    }

    @keyframes cam-pulse {
        0% { filter: drop-shadow(0 0 2px #D4AF37); }
        100% { filter: drop-shadow(0 0 10px #D4AF37); opacity: 1; }
    }
</style>
        
        

        
                     
                    

        <!-- STATIC FOOTER NAV (FIXED AT BOTTOM) -->
        <nav class="depth-dock">
            <div class="depth-item active" onclick="activate(this)"><i class="fa-solid fa-house"></i></div>
            <div class="depth-item" onclick="activate(this)"><i class="fa-solid fa-chart-pie"></i></div>
            <div class="depth-item" onclick="activate(this)"><i class="fa-solid fa-basket-shopping"></i></div>
            <div class="depth-item" onclick="activate(this)"><i class="fa-solid fa-paper-plane"></i></div>
            <div class="depth-item" onclick="activate(this)"><i class="fa-solid fa-id-card-clip"></i></div>
        </nav>
    </div>

    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                const welcome = document.getElementById('welcome-screen');
                const main = document.getElementById('main-content');
                welcome.classList.add('screen-exit');
                setTimeout(() => {
                    welcome.style.display = 'none';
                    main.classList.add('show');
                }, 1500); 
            }, 5000); 
        });

        // MELTING ACTION LOGIC
        const clickables = document.querySelectorAll('.clickable-box, .depth-item');
        clickables.forEach(btn => {
            btn.addEventListener('click', function() {
                document.getElementById('main-content').classList.add('melt-trigger');
                setTimeout(() => {
                    // Logic din tafiya zuwa wani shafin anan
                    console.log("Melting complete...");
                }, 1000);
            });
        });

        function activate(el) {
            document.querySelectorAll('.depth-item').forEach(item => item.classList.remove('active'));
            el.classList.add('active');
        }

        const cards = document.querySelectorAll('.glass-card');
        cards.forEach(card => {
            card.addEventListener('click', function() {
                cards.forEach(c => c.classList.remove('active-prism'));
                this.classList.add('active-prism');
                const titleElement = this.querySelector('h3') || this.querySelector('h2');
                const title = titleElement ? titleElement.innerText : '';
                if(title) localStorage.setItem('mafita_last_active', title);
            });
        });

        document.addEventListener('DOMContentLoaded', () => {
            const lastActive = localStorage.getItem('mafita_last_active');
            if(lastActive) {
                cards.forEach(card => {
                    const titleElement = card.querySelector('h3') || card.querySelector('h2');
                    const cardTitle = titleElement ? titleElement.innerText : '';
                    if(cardTitle === lastActive) card.classList.add('active-prism');
                });
            }
        });
    </script>
</body>
</html>
