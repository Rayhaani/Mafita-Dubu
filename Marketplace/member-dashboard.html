<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mafita Dubu - Member Dashboard</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Quicksand:wght@300;400;500;600;700;800&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --milk: #FFFDD0;
            --deep-gold: #b58900;
            --gold-glow: #D4AF37;
            --sand-color: #C2B280;
            --void-bg: #050505;
            --neon-gold: #D4AF37;
        }

        /* --- SPLASH SCREEN --- */
        #welcome-screen {
            position: fixed; inset: 0; background: var(--void-bg); z-index: 10000;
            display: flex; align-items: center; justify-content: center; overflow: hidden;
            transition: all 1.5s cubic-bezier(0.6, -0.28, 0.735, 0.045);
        }
        .sand-text {
            font-family: 'Syncopate', sans-serif; font-size: clamp(3rem, 15vw, 6.5rem);
            font-weight: 700; color: transparent; -webkit-text-stroke: 1px rgba(194, 178, 128, 0.5);
            position: relative; letter-spacing: 0.5em; text-transform: uppercase;
            animation: assemble 4s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }
        .sand-text::after {
            content: 'SADIQ'; position: absolute; left: 0; top: 0; width: 100%; height: 100%;
            color: var(--sand-color); text-shadow: 0 0 20px var(--sand-color);
            mask-image: linear-gradient(to right, transparent, black, transparent);
            mask-size: 200% 100%; animation: sandWave 3s linear infinite;
        }
        @keyframes assemble {
            0% { letter-spacing: 2em; opacity: 0; filter: blur(20px); transform: scale(1.5); }
            100% { letter-spacing: 0.2em; opacity: 1; filter: blur(0px); transform: scale(1); }
        }
        @keyframes sandWave { 0% { mask-position: 200% 0%; } 100% { mask-position: -200% 0%; } }
        .sand-line { height: 2px; background: linear-gradient(to right, transparent, var(--sand-color), transparent); width: 100%; margin-top: 10px; }
        .screen-exit { filter: opacity(0) saturate(0) blur(40px); transform: scale(0.8); pointer-events: none; }
        
        body { font-family: 'Quicksand', sans-serif; background-color: var(--milk); margin: 0; overflow-x: hidden; }
        #main-content { opacity: 0; transform: scale(0.98); transition: all 1s ease-out; background-color: var(--milk); padding-bottom: 60px; }
        #main-content.show { opacity: 1; transform: scale(1); }

        /* --- TEMU EXACT HEADER --- */
        .search-wrapper { 
            width: 100%; 
            display: flex; 
            justify-content: center; 
            position: sticky; 
            top: 0; 
            z-index: 8000; 
            background-color: var(--milk); 
            padding: 5px 12px 10px 12px;
        }
        .titan-search-engine {
            position: relative; 
            width: 100%; 
            height: 40px;
            display: flex; 
            align-items: center; 
            background: transparent;
            border-radius: 22px; 
            padding-left: 15px;
            border: 1.5px solid #000;
        }
        .titan-input {
            flex: 1; background: transparent; border: none; outline: none;
            color: #333;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 500;
        }
        .titan-input::placeholder { 
            color: #888; 
            font-family: 'Quicksand', sans-serif;
            font-size: 14px;
        }

        .temu-controls { 
            display: flex; 
            align-items: center; 
            height: 100%;
        }
        .camera-trigger { 
            color: #000; 
            font-size: 24px; 
            cursor: pointer; 
            padding: 0 10px;
        }
        .search-trigger-circle {
            background: #000; 
            width: 36px; height: 36px; 
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; 
            margin-right: 3px;
        }
        .search-trigger-circle i { color: #fff; font-size: 16px; }
        
        .golden-scan-line {
            position: absolute; bottom: -2px; left: 50%; transform: translateX(-50%); 
            height: 2px; width: 0%;
            background: linear-gradient(90deg, transparent, var(--gold-glow), #fff, var(--gold-glow), transparent);
            transition: width 0.4s ease;
        }
        .titan-input:focus ~ .golden-scan-line { width: 85%; }

        /* --- 8 BOXES STYLING --- */
        .static-box { position: relative; overflow: hidden; height: 208px; border-radius: 2.5rem; background: #0c0c0c; }
        .box-title { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 14px; text-transform: capitalize; z-index: 45; }
        .img-container { position: absolute; inset: 0; width: 100%; height: 100%; }
        .box-overlay { position: absolute; inset: 0; z-index: 35; background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 70%); }
        .royal-seal {
            background: radial-gradient(circle, #ffd700 0%, #b8860b 100%);
            border: 1.5px solid #fff; border-radius: 50%; width: 28px; height: 28px;
            display: flex; align-items: center; justify-content: center; margin-top: 8px;
        }

        /* --- ULTRA-SMART MINIMALIST FOOTER --- */
        .depth-dock { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            height: 50px; /* Slimmer height */
            background: var(--milk); 
            display: flex; 
            justify-content: space-around; 
            align-items: center; 
            padding: 0; /* Zero padding */
            box-shadow: 0 -1px 10px rgba(0,0,0,0.05); 
            border-top: 0.5px solid rgba(0, 0, 0, 0.08); 
            z-index: 9999;
        }
        .depth-item { 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s; color: #555; width: 20%; height: 100%;
        }
        .depth-item i {
            font-size: 18px; /* Professional smaller size */
            margin: 0;
        }
        .depth-label { 
            font-size: 9px; 
            font-weight: 700; 
            font-family: 'Inter', sans-serif; 
            margin-top: 1px;
        }
        
        .depth-item.active { color: #000; }
        .depth-item:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <div class="text-center">
            <h1 class="sand-text">SADIQ</h1>
            <div class="sand-line"></div>
            <p class="text-[8px] tracking-[1em] text-white/30 mt-6 uppercase">Reconstructing Protocol</p>
        </div>
    </div>

    <div id="main-content">
        <header class="search-wrapper">
            <div class="titan-search-engine">
                <input type="text" placeholder="Nemi komai a Mafita Dubu..." class="titan-input">
                <div class="temu-controls">
                    <i class="fa-solid fa-camera camera-trigger"></i>
                    <div class="search-trigger-circle">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </div>
                </div>
                <div class="golden-scan-line"></div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-6 mt-4">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6 pb-12">
                <a href="Marketplace/market.html" class="static-box block">
                    <div class="absolute inset-0 flex flex-col items-center justify-center z-[40]"><h4 class="box-title text-white">Sashen 'Yan Kasuwa</h4><div class="royal-seal"><i class="fa-solid fa-bolt text-white text-[10px]"></i></div></div>
                    <div class="img-container"><img src="https://i.postimg.cc/02LNsdFH/istockphoto-2196140224-612x612.jpg" class="w-full h-full object-cover"><div class="box-overlay"></div></div>
                </a>
                <a href="Used Hub/index.html" class="static-box block">
                    <div class="absolute inset-0 flex flex-col items-center justify-center z-[40]"><h4 class="box-title text-white">Kasuwar Gwanjo</h4><div class="royal-seal"><i class="fa-solid fa-tags text-white text-[10px]"></i></div></div>
                    <div class="img-container"><img src="https://images.unsplash.com/photo-1489987707025-afc232f7ea0f?q=80&w=400" class="w-full h-full object-cover"><div class="box-overlay"></div></div>
                </a>
                <a href="Health Hub/health.html" class="static-box block">
                    <div class="absolute inset-0 flex flex-col items-center justify-center z-[40]"><h4 class="box-title text-white">Kiwon Lafiya</h4><div class="royal-seal"><i class="fa-solid fa-heart-pulse text-white text-[10px]"></i></div></div>
                    <div class="img-container"><img src="https://i.postimg.cc/Y0P2spNJ/image-1.jpg" class="w-full h-full object-cover"><div class="box-overlay"></div></div>
                </a>
                <a href="Daular Sana'a/index.html" class="static-box block">
                    <div class="absolute inset-0 flex flex-col items-center justify-center z-[40]"><h4 class="box-title text-white">Koyon Sana'a</h4><div class="royal-seal"><i class="fa-solid fa-hammer text-white text-[10px]"></i></div></div>
                    <div class="img-container"><img src="https://i.postimg.cc/j2V5zhch/IMG-20260122-WA0044(1).jpg" class="w-full h-full object-cover"><div class="box-overlay"></div></div>
                </a>
                <a href="Marriage Hub/marriage-hub.html" class="static-box block">
                    <div class="absolute inset-0 flex flex-col items-center justify-center z-[40]"><h4 class="box-title text-pink-500">Dandalin Aure</h4><div class="royal-seal" style="background: radial-gradient(circle, #ff69b4 0%, #c71585 100%);"><i class="fa-solid fa-heart text-white text-[10px]"></i></div></div>   
                    <div class="img-container"><img src="https://i.postimg.cc/pT5n7Xh8/wedding-1.jpg" class="w-full h-full object-cover"><div class="box-overlay"></div></div>
                </a>
                <div class="static-box">
                    <div class="absolute inset-0 flex flex-col items-center justify-center z-[40]"><h4 class="box-title text-yellow-500">Mafita Hub</h4><div class="royal-seal"><i class="fa-solid fa-star text-white text-[10px]"></i></div></div>
                    <div class="img-container"><img src="https://i.postimg.cc/GtRJvx6H/IMG-20260123-WA0031(1).jpg" class="w-full h-full object-cover"><div class="box-overlay"></div></div>
                </div>
                <div class="static-box">
                    <div class="absolute inset-0 flex flex-col items-center justify-center z-[40]"><h4 class="box-title text-purple-500">Kwararru</h4><div class="royal-seal"><i class="fa-solid fa-user-gear text-white text-[10px]"></i></div></div>
                    <div class="img-container"><img src="https://i.postimg.cc/JzcXcxTS/IMG-20260124-WA0029.jpg" class="w-full h-full object-cover"><div class="box-overlay"></div></div>
                </div>
                <div class="static-box">
                    <div class="absolute inset-0 flex flex-col items-center justify-center z-[40]"><h4 class="box-title text-orange-500">Sashen Girki</h4><div class="royal-seal"><i class="fa-solid fa-bowl-food text-white text-[10px]"></i></div></div>
                    <div class="img-container"><img src="https://images.unsplash.com/photo-1556910103-1c02745aae4d?w=400" class="w-full h-full object-cover"><div class="box-overlay"></div></div>
                </div>
            </div>
        </main>
    </div>

    <!-- RESTORED TRANSACTIONS & SLIM FOOTER -->
    <nav class="depth-dock">
        <div class="depth-item active" onclick="activate(this)">
            <i class="fa-solid fa-house"></i>
            <span class="depth-label">Home</span>
        </div>
        <div class="depth-item" onclick="activate(this)">
            <i class="fa-solid fa-list-ul"></i>
            <span class="depth-label">Categories</span>
        </div>
        <div class="depth-item" onclick="activate(this)">
            <i class="fa-solid fa-comment-dots"></i>
            <span class="depth-label">Messages</span>
        </div>
        <div class="depth-item" onclick="activate(this)">
            <i class="fa-solid fa-basket-shopping"></i>
            <span class="depth-label">Transactions</span>
        </div>
        <div class="depth-item" onclick="activate(this)">
            <i class="fa-solid fa-user"></i>
            <span class="depth-label">You</span>
        </div>
    </nav>

    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                const welcome = document.getElementById('welcome-screen');
                const main = document.getElementById('main-content');
                welcome.classList.add('screen-exit');
                setTimeout(() => {
                    welcome.style.display = 'none';
                    main.classList.add('show');
                }, 1500); 
            }, 5000); 
        });

        function activate(el) {
            document.querySelectorAll('.depth-item').forEach(item => item.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
                    </html>
