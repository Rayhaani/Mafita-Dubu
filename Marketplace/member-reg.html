<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mafita Dubu | Premium Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@800&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --milk-bg: #FFF5E1; --royal-black: #1a1405; --dark-gold: #8b6b1b; --light-gold: #f3cf7a; --gold: #bf953f; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--milk-bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .luxury-card { background: var(--royal-black); border: 2px solid var(--dark-gold); border-radius: 40px 10px; padding: 40px 30px 25px; width: 100%; max-width: 400px; box-shadow: 0 30px 60px rgba(0,0,0,0.5); position: relative; }
        .header-title { font-family: 'Cinzel', serif; font-size: 1.6rem; color: var(--light-gold); text-align: center; margin-bottom: 25px; }
        .gold-input { width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(243, 207, 122, 0.2); padding: 12px 15px; border-radius: 12px; color: #fff; outline: none; margin-bottom: 1rem; }
        .submit-btn { background: linear-gradient(135deg, #bf953f 0%, #fcf6ba 50%, #b38728 100%); color: #1a1405; font-family: 'Cinzel', serif; font-weight: 900; width: 100%; padding: 12px; border-radius: 10px; cursor: pointer; border: none; }
        #status-toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: #1a1405; border-left: 4px solid #bf953f; padding: 15px; border-radius: 8px; transition: 0.5s; z-index: 1000; color: white; width: 90%; max-width: 350px; }
    </style>
</head>
<body>

    <div id="status-toast">System Alert: <span id="toast-msg"></span></div>

    <div class="luxury-card">
        <h1 class="header-title" id="mainTitle">Mafita Dubu</h1>

        <div id="registerSection">
            <form id="universalRegisterForm">
                <input type="text" id="fullName" class="gold-input" placeholder="Full Name" required>
                <input type="text" id="username" class="gold-input" placeholder="Username" required>
                <input type="email" id="email" class="gold-input" placeholder="Email Address" required>
                <div class="grid grid-cols-2 gap-2">
                    <input type="tel" id="phone" class="gold-input" placeholder="Phone" required>
                    <input type="text" id="state" class="gold-input" placeholder="State" required>
                </div>
                <input type="password" id="password" class="gold-input" placeholder="Password" required>
                <button type="submit" id="regBtn" class="submit-btn">REGISTER NOW</button>
            </form>
        </div>

        <div id="verifySection" class="hidden text-center py-4">
            <div class="mb-4"><span class="text-6xl">📧</span></div>
            <h2 class="text-[#f3cf7a] font-bold text-xl mb-2">Tantance Email</h2>
            <p class="text-white/70 text-sm mb-6">Mun tura link dinka zuwa email dinka. Shiga Inbox dinka ka danna domin kunna account dinka.</p>
            <button id="goToLoginBtn" class="submit-btn">NA DANNA LINK DIN (LOGIN)</button>
            <p class="mt-4 text-xs text-white/50">Ba ka ga sako ba? <a href="#" id="resendBtn" class="text-[#f3cf7a] underline">Sake turawa</a></p>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, sendEmailVerification, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDJfUePiQV5R1YAcnq-zvfd3ty4lbzDs1M",
        authDomain: "global-market-admin.firebaseapp.com",
        projectId: "global-market-admin",
        storageBucket: "global-market-admin.firebasestorage.app",
        messagingSenderId: "259715265619",
        appId: "1:259715265619:web:313919773f57cc5fb9c2a6"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    function showToast(msg) {
        document.getElementById('toast-msg').innerText = msg;
        const toast = document.getElementById('status-toast');
        toast.style.top = '20px';
        setTimeout(() => { toast.style.top = '-100px'; }, 4000);
    }

    // Register Logic
    document.getElementById('universalRegisterForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('regBtn');
        btn.innerText = "CREATING...";
        btn.disabled = true;

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        try {
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            const user = userCredential.user;

            await setDoc(doc(db, "users", user.uid), {
                fullName: document.getElementById('fullName').value,
                username: document.getElementById('username').value.toLowerCase(),
                email: email,
                phone: document.getElementById('phone').value,
                state: document.getElementById('state').value,
                createdAt: serverTimestamp()
            });

            await sendEmailVerification(user);
            
            // Bayan ya gama, mu nuna masa shafin jiran verification kamar na EmailJS
            document.getElementById('registerSection').classList.add('hidden');
            document.getElementById('verifySection').classList.remove('hidden');
            document.getElementById('mainTitle').innerText = "Verify Email";
            
            // Logout domin kada ya shiga dashboard har sai ya yi verifying
            await signOut(auth);

        } catch (error) {
            showToast(error.message);
            btn.innerText = "REGISTER NOW";
            btn.disabled = false;
        }
    };

    // Button da zai kai shi shafin Login
    document.getElementById('goToLoginBtn').onclick = () => {
        window.location.href = "login.html";
    };

    // Resend Email
    document.getElementById('resendBtn').onclick = async (e) => {
        e.preventDefault();
        showToast("Don Allah sake Login domin sake tura sako.");
        window.location.href = "login.html";
    };
</script>
</body>
    </html>
