<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infinity Luxury | Final Fixed Build</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { margin: 0; background: #080808; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* Babban Hoton Sama */
        .hero-container { width: 100%; height: 115vw; position: relative; overflow: hidden; background: #111; }
        #dynamic-img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }

        /* Katin Bayani */
        .floating-card { 
            background: rgba(20, 20, 20, 0.7); 
            backdrop-filter: blur(25px); 
            margin: -40px 15px 20px 15px; 
            padding: 30px 20px; 
            border-radius: 35px; 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            position: relative; 
            z-index: 10;
        }
        .price-tag { 
            font-size: 38px; 
            font-weight: 900; 
            background: linear-gradient(to right, #fff, #aaa); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        /* AI Module */
        .ai-module { 
            background: linear-gradient(145deg, rgba(20,20,20,0.9), rgba(0,0,0,0.9)); 
            border: 1px solid rgba(0, 242, 255, 0.2); 
            padding: 20px; 
            border-radius: 24px; 
            margin-top: 20px; 
            position: relative; 
            overflow: hidden; 
        }
        .scan-line { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 2px; 
            background: #00f2ff; 
            box-shadow: 0 0 15px #00f2ff; 
            animation: scanMove 4s infinite linear; 
        }
        @keyframes scanMove { 0% { top: 0% } 100% { top: 100% } }

        /* SALES BOY - GLOW & POSITION FIX */
        #sales-boy-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 85px;
            z-index: 999999 !important;
            pointer-events: none;
        }
        #ai-person {
            width: 100%;
            height: auto;
            border-radius: 15px;
            border: 2px solid #00f2ff;
            background: #111;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.7);
            animation: breathe 3s ease-in-out infinite;
        }
        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.08); opacity: 1; }
        }

        .section-title { font-size: 11px; font-weight: 700; color: #555; letter-spacing: 5px; text-transform: uppercase; margin: 40px 20px 10px 20px; display: block; }
    </style>
</head>
<body>

<div class="content-layer">
    <div class="hero-container">
        <img src="https://www.pngarts.com/files/3/Man-With-Suit-PNG-High-Quality-Image.png" id="dynamic-img">
    </div>

    <div class="floating-card">
        <h1 id="product-name" class="text-2xl font-bold mb-2">Executive Brocade Wax</h1>
        <div class="price-tag" id="main-price">₦18,500</div>
        
        <div class="ai-module">
            <div class="scan-line"></div>
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-microchip text-cyan-400"></i>
                    <div>
                        <h3 class="text-xs font-bold text-white uppercase">Neural Stitch V.2</h3>
                        <p class="text-[9px] text-gray-500">READY TO SCAN</p>
                    </div>
                </div>
                <button class="text-[10px] border border-cyan-400/50 px-4 py-2 rounded-lg">SCAN</button>
            </div>
        </div>
    </div>

    <span class="section-title">Visual Proof</span>
    <div class="px-5">
        <div id="proof-container" style="width: 100%; height: 200px; background: #111; border-radius: 25px; overflow: hidden; border: 1px solid #333;">
            <img src="" id="proof-img" style="width: 100%; height: 100%; object-fit: cover;">
        </div>
    </div>
</div>

<div id="sales-boy-container">
    <img src="https://www.pngarts.com/files/3/Man-With-Suit-PNG-High-Quality-Image.png" id="ai-person">
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // 1. Bayanan Atamfa na Asali (Fallback)
    const defaultProduct = {
        name: "Executive Brocade Wax",
        price: "18500",
        img: "https://www.shutterstock.com/shutterstock/photos/2171120031/display_1500/stock-photo-textile-fashion-african-print-fabric-bright-colors-and-ornate-designs-suitable-for-clothing-2171120031.jpg"
    };

    // 2. Duba ko akwai sabon kaya a localStorage
    let product = defaultProduct;
    const storedData = localStorage.getItem('selectedProduct');
    
    if (storedData) {
        try {
            const parsed = JSON.parse(storedData);
            if(parsed.img && parsed.img !== "") product = parsed;
        } catch(e) { console.error("Error loading data"); }
    }

    // 3. Saka bayanan a shafi
    document.getElementById('dynamic-img').src = product.img;
    document.getElementById('proof-img').src = product.img;
    document.getElementById('product-name').innerText = product.name;
    document.getElementById('main-price').innerText = "₦" + Number(product.price).toLocaleString();
});
</script>
</body>
</html>
