<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mafita Dubu | Premium Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@800&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --milk-bg: #FFF5E1; --royal-black: #1a1405; --dark-gold: #8b6b1b; --light-gold: #f3cf7a; --gold: #bf953f; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--milk-bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .liquid-color-circle { width: 80px; height: 80px; margin: -90px auto 15px; position: relative; z-index: 100; border-radius: 50%; border: 2px solid #ffffff; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.5); background: linear-gradient(-45deg, #ffd700, #ff00ea, #00d4ff, #3dff00, #ff9100, #7028e4); background-size: 400% 400%; animation: liquidFlow 8s ease infinite; }
        @keyframes liquidFlow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .luxury-card { background: var(--royal-black); border: 2px solid var(--dark-gold); border-radius: 40px 10px; padding: 40px 30px 25px; width: 100%; max-width: 400px; box-shadow: 0 30px 60px rgba(0,0,0,0.5); position: relative; margin-top: 50px; }
        .header-title { font-family: 'Cinzel', serif; font-size: 1.6rem; color: var(--light-gold); text-align: center; margin-bottom: 25px; }
        .gold-input { width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(243, 207, 122, 0.2); padding: 12px 15px; border-radius: 12px; color: #fff; font-size: 0.85rem; outline: none; }
        .submit-btn { background: linear-gradient(135deg, #bf953f 0%, #fcf6ba 50%, #b38728 100%); color: #1a1405; font-family: 'Cinzel', serif; font-weight: 900; width: 100%; padding: 12px; border-radius: 10px; margin-top: 15px; font-size: 1rem; border: none; cursor: pointer; transition: 0.3s; }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .login-footer { text-align: center; margin-top: 20px; color: #ffffff; font-size: 0.85rem; }
        .login-footer a { color: var(--light-gold); font-weight: 700; text-decoration: none; margin-left: 5px; }
        #status-toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 90%; max-width: 350px; background: #1a1405; border-left: 4px solid #bf953f; padding: 15px; border-radius: 8px; transition: 0.5s; display: flex; align-items: center; gap: 12px; }
        
        /* Bangaren Boye Setup Section */
        #setupSection { display: none; }
    </style>
</head>
<body>

    <div id="status-toast">
        <div style="color: #f3cf7a; font-weight: bold; font-size: 20px;">!</div>
        <div>
            <p id="toast-title" style="text-transform: uppercase; font-size: 10px; color: #888; font-weight: 800; margin: 0;">System Alert</p>
            <p id="toast-msg" style="color: white; font-size: 12px; margin: 0;"></p>
        </div>
    </div>

    <div class="luxury-card">
        <div class="liquid-color-circle"></div>
        <h1 class="header-title" id="mainTitle">Mafita Dubu</h1>

        <div id="registerSection">
            <form id="universalRegisterForm">
                <div class="mb-4"><input type="text" id="fullName" class="gold-input" placeholder="Full Name" required></div>
                <div class="mb-4"><input type="text" id="username" class="gold-input" placeholder="Username" required></div>
                <div class="mb-4"><input type="email" id="email" class="gold-input" placeholder="Email Address" required></div>
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <input type="tel" id="phone" class="gold-input" placeholder="Phone" required>
                    <input type="text" id="state" class="gold-input" placeholder="State" required>
                </div>
                <div class="mb-4"><input type="password" id="password" class="gold-input" placeholder="Password" required></div>
                <button type="submit" id="regBtn" class="submit-btn">REGISTER NOW</button>
                <div class="login-footer">Already have an account? <a href="login.html">Login</a></div>
            </form>
        </div>

        <div id="setupSection">
    <p class="text-white text-[10px] text-center mb-4 opacity-70">Saita bayanan kasuwancinka daki-daki</p>
    <form id="setupForm">
        <div class="mb-4">
            <input type="text" id="bizName" class="gold-input" placeholder="Business Name" required>
        </div>

        <div class="mb-4">
            <select id="bizCategory" class="gold-input bg-[#1a1405]" onchange="updateSubCategory()" required>
                <option value="" disabled selected>Select Category</option>
                <option value="Clothing">Clothing (Tufafi)</option>
                <option value="Shoes">Shoes (Takalmi)</option>
                <option value="Electronics">Electronics</option>
            </select>
        </div>

        <div id="subCatWrapper" class="mb-4 hidden">
            <select id="subCategory" class="gold-input bg-[#1a1405]">
                </select>
        </div>

        <div class="mb-4">
            <select id="shopType" class="gold-input bg-[#1a1405]" required>
                <option value="" disabled selected>Shop Type</option>
                <option value="Physical">Physical Shop (Ina da Shago)</option>
                <option value="Home">Home-based (Daga Gida nake aiki)</option>
            </select>
        </div>
        
        <div class="mb-4">
            <button type="button" onclick="startGPS()" id="gpsBtn" class="gold-input flex items-center justify-center gap-2 border-[#bf953f] hover:bg-[#3d2c10]">
                <span id="gps-icon">📍</span> 
                <span id="gps-text" class="text-[10px] font-bold">DAUKO LOCATION (GPS)</span>
            </button>
            <input type="hidden" id="lat">
            <input type="hidden" id="lng">
        </div>

        <button type="submit" id="setupBtn" class="submit-btn">FINISH SETUP</button>
    </form>
        </div>
        

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, sendEmailVerification } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDJfUePiQV5R1YAcnq-zvfd3ty4lbzDs1M",
            authDomain: "global-market-admin.firebaseapp.com",
            projectId: "global-market-admin",
            storageBucket: "global-market-admin.firebasestorage.app",
            messagingSenderId: "259715265619",
            appId: "1:259715265619:web:313919773f57cc5fb9c2a6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUserUid = null;

        window.showToast = function(msg, isError = false) {
            const toast = document.getElementById('status-toast');
            document.getElementById('toast-msg').innerText = msg;
            toast.style.borderLeftColor = isError ? '#ef4444' : '#bf953f';
            toast.style.top = '20px';
            setTimeout(() => { toast.style.top = '-100px'; }, 5000);
        }

        // Function na daukar Location daidai (High Accuracy)
window.startGPS = function() {
    const gpsText = document.getElementById('gps-text');
    const gpsBtn = document.getElementById('gpsBtn');
    
    gpsText.innerText = "ANA NEMAN INDA KAKE (GPS)...";
    gpsBtn.disabled = true; // Hana danna shi yayin da yake nema

    const options = {
        enableHighAccuracy: true, // Amfani da madaidaicin GPS
        timeout: 10000,          // Jira na tsawon sakan 10
        maximumAge: 0            // Kada a yi amfani da tsohon cache
    };

    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition((pos) => {
            // Daukar Lat da Lng
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;

            // Adana su a hidden inputs
            document.getElementById('lat').value = lat;
            document.getElementById('lng').value = lng;
            
            // Canza kalar button da rubutu don nuna nasara
            gpsText.innerText = "✅ LOCATION FIXED (SUCCESS)";
            gpsBtn.style.borderColor = "#00ffcc";
            gpsText.style.color = "#00ffcc";
            gpsBtn.disabled = false;

            showToast("An samu madaidaicin wurin shagonka!");
        }, (err) => {
            gpsBtn.disabled = false;
            let errorMsg = "Kunna GPS din wayarka!";
            if(err.code === 1) errorMsg = "Ka ba mu damar (Permission) daukar location!";
            
            showToast(errorMsg, true);
            gpsText.innerText = "❌ SAKE GWADA GPS";
        }, options);
    } else {
        showToast("Browser dinka ba ta da GPS.", true);
    }
};
        

        // STEP 1: REGISTER
        document.getElementById('universalRegisterForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('regBtn');
            btn.disabled = true; btn.innerText = "PROCESSING...";

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
                currentUserUid = userCredential.user.uid;

                await setDoc(doc(db, "users", currentUserUid), {
                    fullName: document.getElementById('fullName').value,
                    username: document.getElementById('username').value,
                    email: document.getElementById('email').value,
                    role: "vendor",
                    createdAt: serverTimestamp()
                });

                await sendEmailVerification(userCredential.user);

                // Nuna Setup Overlay
                document.getElementById('registerSection').style.display = 'none';
                document.getElementById('setupSection').style.display = 'block';
                document.getElementById('mainTitle').innerText = "Business Setup";

            } catch (error) {
                showToast(error.message, true);
                btn.disabled = false; btn.innerText = "REGISTER NOW";
            }
        };

        // STEP 2: SETUP
        document.getElementById('setupForm').onsubmit = async (e) => {
            e.preventDefault();
            const lat = document.getElementById('lat').value;
            if(!lat) return showToast("Dole ne ka dauki GPS Location!", true);

            const btn = document.getElementById('setupBtn');
            btn.disabled = true; btn.innerText = "SAVING...";

            try {
                await setDoc(doc(db, "vendor_details", currentUserUid), {
                    businessName: document.getElementById('bizName').value,
                    category: document.getElementById('bizCategory').value,
                    latitude: lat,
                    longitude: document.getElementById('lng').value,
                    setupComplete: true,
                    status: "pending"
                });

                showToast("An kammala! Duba Email dinka don verify.");
                setTimeout(() => { window.location.href = "login.html"; }, 3000);
            } catch (error) {
                showToast(error.message, true);
                btn.disabled = false;
            }
        };


        // Data na Categories
const categoryData = {
    "Clothing": ["Men's Wear", "Women's Wear", "Children's Wear", "Traditional (Kaftan/Abaya)"],
    "Shoes": ["Sneakers", "Corporate Shoes", "Sandals/Slippers", "Kids Shoes"],
    "Electronics": ["Phones & Tablets", "Laptops", "Home Appliances", "Accessories"]
};

window.updateSubCategory = function() {
    const mainCat = document.getElementById('bizCategory').value;
    const subCatWrapper = document.getElementById('subCatWrapper');
    const subCatSelect = document.getElementById('subCategory');
    
    if (categoryData[mainCat]) {
        subCatWrapper.classList.remove('hidden');
        subCatSelect.innerHTML = '<option value="" disabled selected>Select Sub-category</option>';
        
        categoryData[mainCat].forEach(item => {
            const option = document.createElement('option');
            option.value = item;
            option.text = item;
            subCatSelect.appendChild(option);
        });
    } else {
        subCatWrapper.classList.add('hidden');
    }
};



        // 1. Data na Categories
const categoryData = {
    "Clothing": ["Men's Wear", "Women's Wear", "Children's Wear", "Traditional (Kaftan/Abaya)"],
    "Shoes": ["Sneakers", "Corporate Shoes", "Sandals/Slippers", "Kids Shoes"],
    "Electronics": ["Phones & Tablets", "Laptops", "Home Appliances", "Accessories"]
};

// 2. Function na nuna Sub-category
window.updateSubCategory = function() {
    const mainCat = document.getElementById('bizCategory').value;
    const subCatWrapper = document.getElementById('subCatWrapper');
    const subCatSelect = document.getElementById('subCategory');
    
    if (categoryData[mainCat]) {
        subCatWrapper.classList.remove('hidden');
        subCatSelect.innerHTML = '<option value="" disabled selected>Select Sub-category</option>';
        categoryData[mainCat].forEach(item => {
            const option = document.createElement('option');
            option.value = item;
            option.text = item;
            subCatSelect.appendChild(option);
        });
    } else {
        subCatWrapper.classList.add('hidden');
    }
};

// 3. Active GPS Function (High Accuracy)
window.startGPS = function() {
    const gpsText = document.getElementById('gps-text');
    const gpsBtn = document.getElementById('gpsBtn');
    gpsText.innerText = "NEMAN LOCATION...";
    gpsBtn.disabled = true;

    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition((pos) => {
            document.getElementById('lat').value = pos.coords.latitude;
            document.getElementById('lng').value = pos.coords.longitude;
            gpsText.innerText = "✅ LOCATION FIXED!";
            gpsBtn.style.borderColor = "#00ffcc";
            gpsText.style.color = "#00ffcc";
            gpsBtn.disabled = false;
            showToast("An samu inda kake!");
        }, () => {
            showToast("Kunna GPS din wayarka!", true);
            gpsText.innerText = "❌ SAKE GWADA GPS";
            gpsBtn.disabled = false;
        }, { enableHighAccuracy: true });
    }
};
            

                 
// Gyaran Save Function (Firebase)
document.getElementById('setupForm').onsubmit = async (e) => {
    e.preventDefault();
    
    // Tabbatar an dauki GPS coordinates
    const latRaw = document.getElementById('lat').value;
    const lngRaw = document.getElementById('lng').value;
    
    if(!latRaw || !lngRaw) {
        return showToast("Dole ne ka dauki GPS Location kafin ka karasa!", true);
    }

    const btn = document.getElementById('setupBtn');
    btn.disabled = true; 
    btn.innerText = "UPLOADING DATA...";

    try {
        // Ajiye komai a matsayin lamba (Float) don Radar View
        await setDoc(doc(db, "vendor_details", currentUserUid), {
            businessName: document.getElementById('bizName').value,
            category: document.getElementById('bizCategory').value,
            subCategory: document.getElementById('subCategory').value,
            shopType: document.getElementById('shopType').value,
            location: {
                lat: parseFloat(latRaw),
                lng: parseFloat(lngRaw)
            },
            status: "pending",
            setupComplete: true,
            isLive: true,
            updatedAt: serverTimestamp()
        });

        showToast("Masha Allah! Bayananka sun isa ga Admin.");
        setTimeout(() => { window.location.href = "login.html"; }, 2500);
    } catch (error) {
        showToast("Error: " + error.message, true);
        btn.disabled = false;
        btn.innerText = "RETRY SETUP";
    }
};
        
        
    </script>
</body>
</html>
