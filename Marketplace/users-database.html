<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCHITECT | PROTOCOL ARCHWAY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700;800;900&family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        :root { --bg-main: #050505; --panel-bg: #0a0a0a; --accent: #ffffff; --neon: #00f7ff; }
        
        /* FONT DA GIRMAN RUBUTU YADDA KAKE SO */
        *{ margin:0; padding:0; box-sizing:border-box; font-family: 'Quicksand', sans-serif; }
        body { 
            background-color: var(--bg-main); color: #ffffff; 
            background-image: url("https://www.transparenttextures.com/patterns/carbon-fibre.png");
            padding-bottom: 120px;
        }
        .syne { font-family: 'Syne', sans-serif; }

        .glass-header {
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky; top: 0; z-index: 1000;
        }

        .panel-container {
            background: var(--panel-bg); border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .standard-input {
            background: #111111; border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px; color: white; padding: 14px 18px;
            width: 100%; font-size: 16px; font-weight: 700;
        }

        .nav-link {
            font-size: 10px; font-weight: 900; letter-spacing: 2px;
            padding: 12px 28px; border-radius: 10px; transition: 0.4s;
            color: rgba(255,255,255,0.4); border: 1px solid transparent;
        }
        .nav-link.active { background: white; color: black; }

        /* DATA ROWS (CATEGORIES) */
        .data-row {
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px; padding: 16px 22px; display: flex;
            justify-content: space-between; align-items: center;
            transition: 0.3s; margin-bottom: 10px; cursor: pointer;
        }
        .data-row:hover { background: rgba(255, 255, 255, 0.05); }
        .data-row.selected { border-left: 4px solid var(--neon); background: rgba(0, 247, 255, 0.05); }

        .cat-name { font-size: 19px; font-weight: 800; } /* GIRMAN SUNAN CATEGORY */
        .sub-count { font-size: 11px; opacity: 0.4; font-weight: 700; }

        /* DOCK MENU */
        .futuristic-dock {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(15, 15, 15, 0.8); backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 100px;
            padding: 12px 25px; display: flex; gap: 20px; z-index: 10000;
        }
        .dock-item {
            width: 50px; height: 50px; display: flex; align-items: center;
            justify-content: center; border-radius: 50%; color: rgba(255,255,255,0.3);
            transition: 0.4s; cursor: pointer;
        }
        .dock-item.active { background: white; color: black; transform: scale(1.2) translateY(-10px); }

        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <header class="glass-header p-8 mb-10">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="flex items-center gap-4">
                <div class="h-10 w-10 bg-white rounded-2xl flex items-center justify-center rotate-12">
                    <i class="fa-solid fa-diagram-project text-black text-xl"></i>
                </div>
                <div>
                    <h1 class="syne text-2xl font-black tracking-tighter uppercase">Protocol <span class="opacity-40">Archway</span></h1>
                    <p class="text-[9px] font-bold tracking-[4px] uppercase opacity-40 text-white">System Segments Manager</p>
                </div>
            </div>
            <nav class="flex gap-2 p-1.5 bg-white/5 rounded-2xl border border-white/5">
                <button onclick="window.switchMode('vendor', this)" class="nav-link active">VENDORS</button>
                <button onclick="window.switchMode('lab', this)" class="nav-link">LABS</button>
                <button onclick="window.switchMode('expert', this)" class="nav-link">EXPERTS</button>
            </nav>
        </div>
    </header>

    <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-10 px-6">
        <section class="lg:col-span-5 panel-container p-10">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-xs font-black tracking-widest uppercase opacity-40">Master Segments</h2>
                <button onclick="window.addNewSegment()" class="text-[10px] font-bold border border-white/20 px-5 py-2.5 rounded-xl hover:bg-white hover:text-black transition uppercase tracking-widest">Add Segment</button>
            </div>
            <div class="space-y-3 custom-scroll max-h-[550px] overflow-y-auto pr-3" id="masterList"></div>
        </section>

        <section class="lg:col-span-7 panel-container p-10">
            <div class="mb-10">
                <h2 class="text-xs font-black tracking-widest uppercase opacity-40 mb-3">Node Configuration</h2>
                <div class="p-4 bg-white/5 rounded-2xl border border-white/5">
                    <p id="selectedCatName" class="text-xl font-bold italic text-white">Select a segment to begin...</p>
                </div>
            </div>
            <div class="flex flex-col md:flex-row gap-4 mb-10">
                <input type="text" id="subInput" placeholder="Specify sub-protocol name..." class="standard-input">
                <button onclick="window.executeAdd()" class="bg-white text-black px-10 py-4 rounded-xl font-black text-[11px] uppercase tracking-widest">Execute</button>
            </div>
            <div class="space-y-3 custom-scroll max-h-[400px] overflow-y-auto pr-3" id="subList"></div>
        </section>
    </main>

    <div class="futuristic-dock">
        <div class="dock-item" onclick="location.href='admin_dashboard.html'"><i class="fa-solid fa-microchip"></i></div>
        <div class="dock-item" onclick="location.href='users-database.html'"><i class="fa-solid fa-fingerprint"></i></div>
        <div class="dock-item active"><i class="fa-solid fa-diagram-project"></i></div>
        <div class="dock-item" onclick="location.href='registry.html'"><i class="fa-solid fa-vault"></i></div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, arrayUnion, arrayRemove, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDJfUePiQV5R1YAcnq-zvfd3ty4lbzDs1M",
        authDomain: "global-market-admin.firebaseapp.com",
        projectId: "global-market-admin",
        storageBucket: "global-market-admin.firebasestorage.app",
        messagingSenderId: "259715265619",
        appId: "1:259715265619:web:313919773f57cc5fb9c2a6"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let currentMode = 'vendor', selectedCategory = null, allCategories = {};

    // 1. Daukowa tare da Real-time Sync
    onSnapshot(doc(db, "app_settings", "categories"), (snap) => {
        if (snap.exists()) {
            allCategories = snap.data();
            window.renderMasterList();
        } else {
            setDoc(doc(db, "app_settings", "categories"), { vendor: {}, lab: {}, expert: {} });
        }
    });

    window.renderMasterList = () => {
        const list = document.getElementById('masterList');
        list.innerHTML = "";
        const categories = allCategories[currentMode] || {};

        Object.keys(categories).sort().forEach(catName => {
            const subCount = categories[catName].length;
            const isSel = selectedCategory === catName;
            list.innerHTML += `
                <div class="data-row ${isSel ? 'selected' : ''}" onclick="window.selectCategory('${catName}')">
                    <div>
                        <h3 class="cat-name ${isSel ? 'text-white' : 'text-gray-400'}">${catName}</h3>
                        <p class="sub-count uppercase">${subCount} Protocols</p>
                    </div>
                    <i class="fa-solid fa-trash-can opacity-20 hover:text-red-500 hover:opacity-100" onclick="event.stopPropagation(); window.deleteCategory('${catName}')"></i>
                </div>`;
        });
        if (selectedCategory) window.renderSubList();
    };

    window.renderSubList = () => {
        document.getElementById('selectedCatName').innerText = selectedCategory;
        const list = document.getElementById('subList');
        list.innerHTML = "";
        const subs = allCategories[currentMode][selectedCategory] || [];
        subs.forEach(sub => {
            list.innerHTML += `
                <div class="data-row">
                    <span class="text-sm font-bold text-gray-300">${sub}</span>
                    <i class="fa-solid fa-xmark text-gray-600 hover:text-red-500" onclick="window.deleteSubCategory('${sub}')"></i>
                </div>`;
        });
    };

    window.addNewSegment = async () => {
        const name = prompt("New Segment Name:");
        if (name && name.trim()) {
            const docRef = doc(db, "app_settings", "categories");
            const snap = await getDoc(docRef);
            let data = snap.data();
            if(!data[currentMode]) data[currentMode] = {};
            data[currentMode][name.trim()] = []; 
            await setDoc(docRef, data);
        }
    };

    window.executeAdd = async () => {
        const val = document.getElementById('subInput').value.trim();
        if (val && selectedCategory) {
            const fieldPath = `${currentMode}.${selectedCategory}`;
            await updateDoc(doc(db, "app_settings", "categories"), { [fieldPath]: arrayUnion(val) });
            document.getElementById('subInput').value = "";
        } else { alert("Zaɓi Category tukunna!"); }
    };

    window.deleteCategory = async (catName) => {
        if(confirm(`Delete ${catName}?`)) {
            const docRef = doc(db, "app_settings", "categories");
            const snap = await getDoc(docRef);
            let data = snap.data();
            delete data[currentMode][catName];
            await setDoc(docRef, data);
            selectedCategory = null;
        }
    };

    window.deleteSubCategory = async (subName) => {
        const fieldPath = `${currentMode}.${selectedCategory}`;
        await updateDoc(doc(db, "app_settings", "categories"), { [fieldPath]: arrayRemove(subName) });
    };

    window.selectCategory = (n) => { selectedCategory = n; window.renderMasterList(); };
    window.switchMode = (mode, btn) => {
        currentMode = mode; selectedCategory = null;
        document.querySelectorAll('.nav-link').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        window.renderMasterList();
        document.getElementById('selectedCatName').innerText = "Select a segment to begin...";
        document.getElementById('subList').innerHTML = "";
    };
</script>
</body>
</html>
