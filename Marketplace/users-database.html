<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Futuristic Ecosystem</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

body{
background:#02040a;
color:#fff;
overflow-x:hidden;
}

/* 🌌 PARTICLE BACKGROUND */
canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* HEADER */
.header{
text-align:center;
padding:20px;
font-weight:700;
letter-spacing:1px;
background:rgba(255,255,255,0.03);
backdrop-filter:blur(10px);
}

/* TABS */
.tabs{
display:flex;
overflow-x:auto;
gap:10px;
padding:15px;
}

.tab-btn{
padding:10px 18px;
border-radius:25px;
border:none;
background:rgba(255,255,255,0.05);
color:#aaa;
cursor:pointer;
transition:0.4s;
}

.tab-btn.active{
background:linear-gradient(135deg,#00f7ff,#00c3ff);
color:#000;
box-shadow:0 0 25px #00f7ff;
}

/* CONTAINER */
.container{
padding:15px;
position:relative;
}

/* LIST */
.list{
position:absolute;
width:100%;
opacity:0;
transform:scale(0.9);
pointer-events:none;
transition:0.5s ease;
}

.list.active{
opacity:1;
transform:scale(1);
pointer-events:auto;
position:relative;
}

/* CARD */
.card{
padding:15px;
border-radius:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
margin-bottom:12px;
display:flex;
justify-content:space-between;
align-items:center;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 10px 30px rgba(0,255,255,0.2);
}

/* LEFT */
.left{display:flex;align-items:center;gap:10px;}

.avatar{
width:45px;
height:45px;
border-radius:50%;
background:linear-gradient(135deg,#00f7ff,#008cff);
display:flex;
align-items:center;
justify-content:center;
color:#000;
font-weight:bold;
}

/* BADGE */
.badge{
font-size:11px;
padding:4px 10px;
border-radius:20px;
background:#00f7ff;
color:#000;
}

/* BUTTON */
.icon-btn{
width:30px;
height:30px;
border-radius:50%;
background:rgba(255,255,255,0.08);
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
transition:0.3s;
}

.icon-btn:hover{
background:#00f7ff;
color:#000;
}

  /* Dock Menu Style */
        .futuristic-dock {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 100px;
            padding: 12px 25px;
            display: flex; gap: 20px;
            z-index: 10000;
            box-shadow: 0 25px 50px rgba(0,0,0,1);
        }
        .dock-item {
            width: 48px; height: 48px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; color: rgba(255,255,255,0.3);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        .dock-item:hover, .dock-item.active {
            background: white; color: black;
            transform: scale(1.25) translateY(-12px);
  }
</style>

</head>
<body>

<canvas id="bg"></canvas>

<div class="header">🧠 AI Ecosystem</div>

<div class="tabs">
<button class="tab-btn active" onclick="switchTab('customers',this)">Customers</button>
<button class="tab-btn" onclick="switchTab('vendors',this)">Vendors</button>
<button class="tab-btn" onclick="switchTab('experts',this)">Experts</button>
<button class="tab-btn" onclick="switchTab('labs',this)">Labs</button>
</div>

<div class="container">

<div class="list active" id="customers">
<div class="card">
<div class="left"><div class="avatar">A</div>Aliyu Musa</div>
<div class="badge">VIP</div>
</div>
</div>

<div class="list" id="vendors">
<div class="card">
<div class="left"><div class="avatar">T</div>TechStore</div>
<div class="badge">Top</div>
</div>
</div>

<div class="list" id="experts">
<div class="card">
<div class="left"><div class="avatar">X</div>AI Expert</div>
<div class="badge">AI</div>
</div>
</div>

<div class="list" id="labs">
<div class="card">
<div class="left"><div class="avatar">L</div>Future Lab</div>
<div class="badge">R&D</div>
</div>
</div>

</div>

  <div class="futuristic-dock">
    <div class="dock-item" onclick="location.href='categories.html'" title="Neural Core">
        <i class="fa-solid fa-microchip"></i>
    </div>

    <div class="dock-item" onclick="location.href='users-database.html'" title="Identity Matrix">
        <i class="fa-solid fa-fingerprint"></i>
    </div>

    <div class="dock-item" onclick="location.href='index.html'" title="Protocol Arch">
        <i class="fa-solid fa-diagram-project"></i>
    </div>

    <div class="dock-item" title="Firewall OS">
        <i class="fa-solid fa-shield-halved"></i>
    </div>

    <div class="dock-item active" onclick="location.href='registry.html'" title="Ledger Node">
        <i class="fa-solid fa-vault"></i>
    </div>
  </div>
<script>
// SWITCH
function switchTab(id,btn){
document.querySelectorAll('.list').forEach(l=>l.classList.remove('active'));
document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));

setTimeout(()=>{
document.getElementById(id).classList.add('active');
},150);

btn.classList.add('active');
}

// 🌌 PARTICLES
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<80;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
dx:(Math.random()-0.5),
dy:(Math.random()-0.5)
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
p.x+=p.dx;
p.y+=p.dy;

ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle="cyan";
ctx.fill();
});

requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
