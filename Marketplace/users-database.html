<!DOCTYPE html>
<html lang="ha">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARCHITECT | DYNAMIC CORE</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@700;800;900&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
:root { --neon: #00f7ff; --neon-dim: rgba(0, 247, 255, 0.1); --bg: #02040a; }
*{margin:0;padding:0;box-sizing:border-box;font-family: 'Quicksand', sans-serif;}

body{ background: var(--bg); color:#fff; overflow-x:hidden; min-height: 100vh; }

/* 🚀 HEADER */
.header{
    text-align:center; padding:20px; font-weight:900; font-size: 16px;
    letter-spacing:3px; text-transform: uppercase;
    background: rgba(255,255,255,0.01); backdrop-filter: blur(15px);
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

/* 🧭 TABS (ALL 4 VISIBLE) */
.tabs-wrapper { width: 100%; display: flex; justify-content: center; padding: 15px 5px; }
.tabs { display: flex; width: 100%; max-width: 500px; justify-content: space-between; gap: 4px; }
.tab-btn {
    flex: 1; padding: 10px 2px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05);
    background: rgba(255,255,255,0.03); color:#666; font-size: 10px;
    font-weight: 800; cursor:pointer; transition: 0.3s; text-transform: uppercase;
    text-align: center; white-space: nowrap;
}
.tab-btn.active { background: var(--neon); color:#000; box-shadow: 0 0 15px var(--neon-dim); border-color: var(--neon); }

/* 🔍 MOVABLE & COLLAPSIBLE SEARCH BAR */
#dragContainer {
    position: fixed; 
    top: 120px; 
    right: 20px; 
    z-index: 10000;
    display: flex; 
    align-items: center;
    touch-action: none; /* WANNAN SHINE GYARAN */
}
    
.search-box-style {
    width: 50px; height: 50px;
    background: var(--neon);
    backdrop-filter: blur(20px);
    border: 1px solid var(--neon);
    border-radius: 50%;
    padding: 10px;
    display: flex;
    align-items: center;
    box-shadow: 0 0 20px var(--neon-dim);
    transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.3s, border-radius 0.4s;
    overflow: hidden;
}
.search-box-style.expanded {
    width: 260px;
    border-radius: 30px;
    background: rgba(15, 15, 15, 0.9);
}

#searchIcon { 
    color: #000; font-size: 20px; cursor: move; 
    min-width: 30px; display: flex; justify-content: center;
}
.search-box-style.expanded #searchIcon { color: var(--neon); }

#searchInput {
    background: transparent; border: none; outline: none; color: #fff;
    width: 0; font-weight: 700; transition: 0.3s; opacity: 0;
}
.search-box-style.expanded #searchInput { width: 100%; opacity: 1; padding-left: 10px; }

/* 📦 CONTAINER & CARDS */
.container{ padding:10px; max-width: 600px; margin: 0 auto; }
.card{
    padding: 15px; border-radius:20px; background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.04);
    display:flex; justify-content:space-between; align-items:center; margin-bottom: 10px;
}
.left{ display:flex; align-items:center; gap:10px; }
.avatar{
    width:40px; height:40px; border-radius:10px; background: var(--neon-dim);
    display:flex; align-items:center; justify-content:center;
    color: var(--neon); font-weight:900; font-size: 14px;
}
.actions { display: flex; gap: 6px; }
.act-btn {
    width: 32px; height: 32px; border-radius: 8px; background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08); display: flex; align-items:center; justify-content:center;
    color: #fff; cursor: pointer; font-size: 10px;
}
.act-btn:hover { background: var(--neon); color: #000; }

/* Dock Menu Style */
        .futuristic-dock {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 100px;
            padding: 12px 25px;
            display: flex; gap: 20px;
            z-index: 10000;
            box-shadow: 0 25px 50px rgba(0,0,0,1);
        }
        .dock-item {
            width: 48px; height: 48px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; color: rgba(255,255,255,0.3);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        .dock-item:hover, .dock-item.active {
            background: white; color: black;
            transform: scale(1.25) translateY(-12px);
        }


    /* Futuristic Trash Toggle Style */
#trashToggle {
    transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    padding: 8px;
    border-radius: 10px;
    background: rgba(255, 68, 68, 0.05);
    border: 1px solid rgba(255, 68, 68, 0.1);
    box-shadow: 0 0 0px transparent;
}

#trashToggle.active-neon {
    color: #ff4444 !important;
    background: rgba(255, 68, 68, 0.2);
    border-color: #ff4444;
    box-shadow: 0 0 15px rgba(255, 68, 68, 0.4);
    animation: pulse-red 2s infinite;
}

@keyframes pulse-red {
    0% { transform: scale(1); box-shadow: 0 0 5px rgba(255, 68, 68, 0.4); }
    50% { transform: scale(1.1); box-shadow: 0 0 20px rgba(255, 68, 68, 0.7); }
    100% { transform: scale(1); box-shadow: 0 0 5px rgba(255, 68, 68, 0.4); }
}
    
</style>
</head>
<body>

<div id="dragContainer">
    <div id="draggableSearch" class="search-box-style">
        <i class="fa-solid fa-magnifying-glass" id="searchIcon" onclick="toggleSearch(event)"></i>
        <input type="text" id="searchInput" placeholder="Rubuta suna..." 
       oninput="window.render(this.value)" 
       onmousedown="event.stopPropagation()" 
       ontouchstart="event.stopPropagation()">
        
    </div>
</div>

<div class="header">Identity Ledger</div>

<div class="tabs-wrapper">
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('customer',this)">Customers</button>
        <button class="tab-btn" onclick="switchTab('vendor',this)">Vendors</button>
        <button class="tab-btn" onclick="switchTab('expert',this)">Experts</button>
        <button class="tab-btn" onclick="switchTab('lab',this)">Labs</button>
    </div>
</div>

<div class="container" id="registryBox"></div>

<div class="futuristic-dock">
    <div class="dock-item" onclick="location.href='admin_dashboard.html'" title="Neural Core">
        <i class="fa-solid fa-microchip"></i>
    </div>

    <div class="dock-item" onclick="location.href='users-database.html'" title="Identity Matrix">
        <i class="fa-solid fa-fingerprint"></i>
    </div>

    <div class="dock-item" onclick="location.href='categories.html'" title="Protocol Arch">
        <i class="fa-solid fa-diagram-project"></i>
    </div>

    <div class="dock-item" title="Firewall OS">
        <i class="fa-solid fa-shield-halved"></i>
    </div>

    <div class="dock-item active" onclick="location.href='registry.html'" title="Ledger Node">
        <i class="fa-solid fa-vault"></i>
    </div>
  </div>
<div class="container" id="registryBox">
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyDJfUePiQV5R1YAcnq-zvfd3ty4lbzDs1M",
    authDomain: "global-market-admin.firebaseapp.com",
    projectId: "global-market-admin",
    storageBucket: "global-market-admin.firebasestorage.app",
    messagingSenderId: "259715265619",
    appId: "1:259715265619:web:313919773f57cc5fb9c2a6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
let currentSector = 'customer', allData = [], isTrashMode = false;

// UI ENHANCEMENT: Saka Trash Icon a Header
document.querySelector('.header').innerHTML = `
    Identity Ledger 
    <i class="fa-solid fa-trash-can" id="trashToggle" 
       style="margin-left:15px; font-size:14px; cursor:pointer; color:rgba(255,255,255,0.2);"></i>
`;

document.getElementById('trashToggle').onclick = function() {
    isTrashMode = !isTrashMode;
    this.style.color = isTrashMode ? "#ff4444" : "rgba(255,255,255,0.2)";
    this.classList.toggle('fa-bounce');
    render();
};

const sync = () => {
    onSnapshot(collection(db, "users"), (snap) => {
        allData = [];
        snap.forEach(d => allData.push({id: d.id, ...d.data()}));
        render();
    });
}


   window.render = (filter = "") => {
    const box = document.getElementById('registryBox');
    box.innerHTML = "";
    const searchText = filter.toLowerCase();
    
    allData.forEach(u => {
        const role = (u.role || '').toLowerCase();
        const status = (u.status || '').toLowerCase();
        const name = (u.fullName || u.username || '').toLowerCase();

        // MATAKI NA 1: Tace Status (Ko mutum yana Trash ko baya ciki)
        let isCorrectStatus = false;
        if (isTrashMode) {
            if (status === 'trash') isCorrectStatus = true;
        } else {
            // Idan ba Trash mode ba, nuna Approved/Suspended (ba Deleted ba)
            if (status !== 'trash') isCorrectStatus = true;
        }

        // MATAKI NA 2: Tace Rukunoni (Tabs)
        let isCorrectTab = false;
        if (currentSector === 'customer') {
            if (role === 'customer' || role === 'client' || role === 'member') isCorrectTab = true;
        } else {
            if (role === currentSector) isCorrectTab = true;
        }

        // HADUWA: Dole mutum ya zama yana da Status da ya dace KUMA yana Tab da ya dace
        if(isCorrectStatus && isCorrectTab && name.includes(searchText)) {
            box.innerHTML += `
            <div class="card" style="${status === 'suspended' ? 'opacity: 0.4;' : ''} ${status === 'trash' ? 'border: 1px solid #ff4444; background: rgba(255,0,0,0.05);' : ''}">
                <div class="left">
                    <div class="avatar" style="${status === 'trash' ? 'background:rgba(255,68,68,0.2); color:#ff4444;' : ''}">
                        ${(u.fullName || 'U').charAt(0).toUpperCase()}
                    </div>
                    <div class="u-info">
                        <div class="name">${u.fullName || u.username}</div>
                        <div class="email">${u.email}</div>
                        ${status === 'trash' ? '<div style="font-size:9px; color:#ff4444; font-weight:800; letter-spacing:1px;">RECOVERY PENDING</div>' : ''}
                    </div>
                </div>
                <div class="actions">
                    ${isTrashMode ? 
                        `<div class="act-btn" style="color:#00ff88; border-color:#00ff88;" onclick="window.restoreNode('${u.id}')" title="Restore"><i class="fa-solid fa-trash-arrow-up"></i></div>
                         <div class="act-btn" style="color:#ff4444;" onclick="window.permaKill('${u.id}')" title="Delete Forever"><i class="fa-solid fa-skull-crossbones"></i></div>` :
                        `<div class="act-btn" onclick="window.updateStatus('${u.id}', '${status}')"><i class="fa-solid ${status === 'suspended' ? 'fa-play' : 'fa-pause'}"></i></div>
                         <div class="act-btn" style="color:#ff4444;" onclick="window.softDelete('${u.id}')"><i class="fa-solid fa-trash-can"></i></div>`
                    }
                </div>
            </div>`;
        }
    });

    if (box.innerHTML === "") {
        const msg = isTrashMode ? `Babu gogaggun ${currentSector}s anan.` : `Babu kowa a sashen ${currentSector}s...`;
        box.innerHTML = `<div style="text-align:center; padding:50px; color:#444; font-size:12px;">${msg}</div>`;
    }
};
    

   
    // --- FUNCTIONS ---

// 1. Move to Trash (Soft Delete)
window.softDelete = async (id) => {
    if(confirm('A tura wannan asusun zuwa Bin Shara (Trash)?')) {
        try {
            const userRef = doc(db, "users", id);
            await updateDoc(userRef, { 
                status: 'trash' 
            });
            // Ba sai mun kira render() ba, onSnapshot zai yi mana update da kansa
            console.log("Node moved to trash successfully");
        } catch (error) {
            console.error("Error moving to trash: ", error);
            alert("An samu matsala wajen gogewa!");
        }
    }
};
    
// 2. Restore from Trash
window.restoreNode = async (id, originalRole) => {
    // Dawo dashi as approved/automatic don ya fito a inda yake
    await updateDoc(doc(db, "users", id), { status: 'approved' });
    alert('An dawo da asusun nasara!');
};

// 3. Permanent Delete (Idan kana son gogewa gaba daya yanzu)
window.permaKill = async (id) => {
    if(confirm('WANNAN ZAI GOGE SHI GABA DAYA DAGA DATABASE! Ci gaba?')) {
        await deleteDoc(doc(db, "users", id));
    }
};

window.updateStatus = async (id, s) => { 
    await updateDoc(doc(db, "users", id), { status: s === 'suspended' ? 'approved' : 'suspended' }); 
};

    window.filterData = (val) => render(val);
window.switchTab = (sector, btn) => {
    currentSector = sector;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
}
window.updateStatus = async (id, s) => { await updateDoc(doc(db, "users", id), { status: s === 'suspended' ? 'approved' : 'suspended' }); };
window.killNode = async (id) => { if(confirm('GOGE?')) await deleteDoc(doc(db, "users", id)); };

sync();

    
</script>
</body>
</html>
