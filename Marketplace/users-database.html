<!DOCTYPE html>
<html lang="ha">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARCHITECT | DYNAMIC CORE</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@700;800;900&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
:root { --neon: #00f7ff; --neon-dim: rgba(0, 247, 255, 0.1); --bg: #02040a; }
*{margin:0;padding:0;box-sizing:border-box;font-family: 'Quicksand', sans-serif;}

body{ background: var(--bg); color:#fff; overflow-x:hidden; min-height: 100vh; touch-action: none; }

/* 🚀 HEADER */
.header{
    text-align:center; padding:20px; font-weight:900; font-size: 16px;
    letter-spacing:3px; text-transform: uppercase;
    background: rgba(255,255,255,0.01); backdrop-filter: blur(15px);
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

/* 🧭 TABS (ALL 4 VISIBLE - NO SLIDING) */
.tabs-wrapper {
    width: 100%; display: flex; justify-content: center; padding: 15px 5px;
}
.tabs { 
    display: flex; width: 100%; max-width: 500px; 
    justify-content: space-between; gap: 4px;
}
.tab-btn {
    flex: 1; /* Rarraba sarari daidai */
    padding: 10px 2px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05);
    background: rgba(255,255,255,0.03); color:#666; font-size: 10px; /* Rage size kadan */
    font-weight: 800; cursor:pointer; transition: 0.3s; text-transform: uppercase;
    text-align: center; white-space: nowrap;
}
.tab-btn.active { background: var(--neon); color:#000; box-shadow: 0 0 15px var(--neon-dim); border-color: var(--neon); }

/* 🔍 MOVABLE SEARCH BAR (DRAGGABLE) */
#draggableSearch {
    position: fixed; top: 150px; right: 20px; width: 50px; height: 50px;
    background: var(--neon); border-radius: 50%; display: flex;
    align-items: center; justify-content: center; z-index: 10000;
    cursor: move; box-shadow: 0 0 20px var(--neon-dim);
    transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    overflow: hidden;
}
#draggableSearch.expanded {
    width: 260px; border-radius: 30px; padding: 0 15px; justify-content: flex-start;
    background: rgba(255,255,255,0.1); backdrop-filter: blur(20px); border: 1px solid var(--neon);
}
#draggableSearch i { color: #000; font-size: 20px; min-width: 25px; transition: 0.3s; }
#draggableSearch.expanded i { color: var(--neon); }
#draggableSearch input {
    background: transparent; border: none; outline: none; color: #fff;
    width: 0; font-weight: 700; padding-left: 0; transition: 0.3s;
}
#draggableSearch.expanded input { width: 100%; padding-left: 10px; }

/* 📦 CONTAINER */
.container{ padding:10px; max-width: 600px; margin: 0 auto; }

/* 💎 THE CARD */
.card{
    padding:15px; border-radius:20px; background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.04);
    display:flex; justify-content:space-between; align-items:center; margin-bottom: 10px;
}
.left{ display:flex; align-items:center; gap:10px; }
.avatar{
    width:40px; height:40px; border-radius:10px; background: var(--neon-dim);
    display:flex; align-items:center; justify-content:center;
    color: var(--neon); font-weight:900; font-size: 14px;
}
.u-info .name { font-size: 13px; font-weight: 800; }
.u-info .email { font-size: 9px; color: #444; }

/* 🛠️ ACTION BUTTONS */
.actions { display: flex; gap: 6px; }
.act-btn {
    width: 32px; height: 32px; border-radius: 8px; background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08); display: flex; align-items:center; justify-content:center;
    color: #fff; cursor: pointer; transition: 0.2s; font-size: 10px;
}
.act-btn:hover { background: var(--neon); color: #000; }
.btn-del:hover { background: #ff3344 !important; color: #fff !important; }

/* Dock Menu Style */
        .futuristic-dock {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 100px;
            padding: 12px 25px;
            display: flex; gap: 20px;
            z-index: 10000;
            box-shadow: 0 25px 50px rgba(0,0,0,1);
        }
        .dock-item {
            width: 48px; height: 48px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; color: rgba(255,255,255,0.3);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        .dock-item:hover, .dock-item.active {
            background: white; color: black;
            transform: scale(1.25) translateY(-12px);
    }
</style>
</head>
<body>

<div id="dragContainer" style="position: fixed; top: 120px; right: 20px; z-index: 10000; display: flex; align-items: center;">
    <div id="draggableSearch" class="search-box-style">
        <i class="fa-solid fa-magnifying-glass" id="searchIcon" style="cursor: move; min-width: 30px; color: #00f7ff;" onclick="toggleSearch()"></i>
        
        <input type="text" id="searchInput" placeholder="Rubuta suna..." 
               oninput="window.filterData(this.value)" 
               onmousedown="event.stopPropagation()" 
               ontouchstart="event.stopPropagation()"
               style="background: transparent; border: none; outline: none; color: #fff; width: 180px; font-weight: 700;">
    </div>
</div>

<div class="header">Identity Ledger</div>

<div class="tabs-wrapper">
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('customer',this)">Customers</button>
        <button class="tab-btn" onclick="switchTab('vendor',this)">Vendors</button>
        <button class="tab-btn" onclick="switchTab('expert',this)">Experts</button>
        <button class="tab-btn" onclick="switchTab('lab',this)">Labs</button>
    </div>
</div>

<div class="container" id="registryBox"></div>

   <div class="futuristic-dock">
    <div class="dock-item" onclick="location.href='admin_dashboard.html'" title="Neural Core">
        <i class="fa-solid fa-microchip"></i>
    </div>

    <div class="dock-item" onclick="location.href='users-database.html'" title="Identity Matrix">
        <i class="fa-solid fa-fingerprint"></i>
    </div>

    <div class="dock-item" onclick="location.href='categories.html'" title="Protocol Arch">
        <i class="fa-solid fa-diagram-project"></i>
    </div>

    <div class="dock-item" title="Firewall OS">
        <i class="fa-solid fa-shield-halved"></i>
    </div>

    <div class="dock-item active" onclick="location.href='registry.html'" title="Ledger Node">
        <i class="fa-solid fa-vault"></i>
    </div>
  </div>
<div class="container" id="registryBox">
</div> 

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyDJfUePiQV5R1YAcnq-zvfd3ty4lbzDs1M",
    authDomain: "global-market-admin.firebaseapp.com",
    projectId: "global-market-admin",
    storageBucket: "global-market-admin.firebasestorage.app",
    messagingSenderId: "259715265619",
    appId: "1:259715265619:web:313919773f57cc5fb9c2a6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
let currentSector = 'customer';
let allData = [];

// DRAGGABLE LOGIC
const dragItem = document.getElementById("draggableSearch");
let active = false, currentX, currentY, initialX, initialY, xOffset = 0, yOffset = 0;

document.addEventListener("touchstart", dragStart, false);
document.addEventListener("touchend", dragEnd, false);
document.addEventListener("touchmove", drag, false);

function dragStart(e) {
    initialX = e.touches[0].clientX - xOffset;
    initialY = e.touches[0].clientY - yOffset;
    if (e.target === dragItem || dragItem.contains(e.target)) active = true;
}
function dragEnd() { initialX = currentX; initialY = currentY; active = false; }
function drag(e) {
    if (active) {
        e.preventDefault();
        currentX = e.touches[0].clientX - initialX;
        currentY = e.touches[0].clientY - initialY;
        xOffset = currentX; yOffset = currentY;
        dragItem.style.transform = `translate3d(${currentX}px, ${currentY}px, 0)`;
    }
}

const sync = () => {
    onSnapshot(collection(db, "users"), (snap) => {
        allData = [];
        snap.forEach(d => allData.push({id: d.id, ...d.data()}));
        render();
    });
}

const render = (filter = "") => {
    const box = document.getElementById('registryBox');
    box.innerHTML = "";
    allData.forEach(u => {
        const role = (u.role || '').toLowerCase();
        const status = u.status || 'pending';
        const name = (u.fullName || u.username || '').toLowerCase();
        let match = (currentSector === 'customer' && (role === 'customer' || role === 'client')) || 
                    (role === currentSector && (status === 'approved' || status === 'suspended'));

        if(match && name.includes(filter.toLowerCase())) {
            box.innerHTML += `
            <div class="card" style="${status === 'suspended' ? 'opacity: 0.3;' : ''}">
                <div class="left">
                    <div class="avatar">${(u.fullName || 'U').charAt(0)}</div>
                    <div class="u-info"><div class="name">${u.fullName || u.username}</div><div class="email">${u.email}</div></div>
                </div>
                <div class="actions">
                    <div class="act-btn" onclick="window.updateStatus('${u.id}', '${status}')"><i class="fa-solid ${status === 'suspended' ? 'fa-play' : 'fa-pause'}"></i></div>
                    <div class="act-btn btn-del" onclick="window.killNode('${u.id}')"><i class="fa-solid fa-trash-can"></i></div>
                </div>
            </div>`;
        }
    });
}

window.filterData = (e) => { e.stopPropagation(); render(e.target.value); }
window.switchTab = (sector, btn) => {
    currentSector = sector;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
}
window.updateStatus = async (id, s) => { await updateDoc(doc(db, "users", id), { status: s === 'suspended' ? 'approved' : 'suspended' }); };
window.killNode = async (id) => { if(confirm('TERMINATE?')) await deleteDoc(doc(db, "users", id)); };

sync();
</script>
</body>
</html>
