<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wolay Store | Futuristic Vendor Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Syne:wght@700&display=swap');

        body {
            background: #0f1012; 
            color: white;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        .profile-header {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.01));
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            padding: 30px 20px;
            text-align: center;
        }

        .profile-pic-container {
            position: relative;
            display: inline-block;
            margin-bottom: 15px;
        }

        .profile-pic {
            width: 100px; height: 100px;
            border-radius: 50%;
            border: 3px solid #D4AF37;
            padding: 3px;
            object-fit: cover;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        .premium-badge {
            position: absolute; bottom: 5px; right: 5px;
            background: #D4AF37; color: black;
            font-size: 10px; font-weight: 800;
            padding: 2px 6px; border-radius: 10px;
            border: 2px solid #0f1012;
        }

        .stats-bar {
            display: flex; justify-content: center; gap: 30px; margin: 20px 0;
        }
        .stat-item { text-align: center; }
        .stat-value { font-weight: 800; font-size: 18px; color: #D4AF37; }
        .stat-label { font-size: 12px; color: #888; text-transform: uppercase; }

        .highlights-container {
            display: flex;
            justify-content: flex-start;
            gap: 20px;
            padding: 20px;
            overflow-x: auto;
        }
        .highlights-container::-webkit-scrollbar { display: none; }
        
        .highlight-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 70px;
            gap: 8px;
        }
        .circle-glow {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            padding: 2px;
            background: linear-gradient(45deg, #f093fb 0%, #f5576c 100%);
        }
        .circle-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid #0f1012;
            overflow: hidden;
        }
        .circle-inner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .highlight-label {
            font-size: 11px;
            font-weight: 600;
            color: white;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            grid-auto-rows: 150px; 
            grid-auto-flow: dense;
            gap: 10px; 
            padding: 15px;
            margin-bottom: 100px;
        }

        .grid-item {
            position: relative;
            overflow: hidden;
            background: #1a1b1e;
            border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.05);
        }

        .grid-item:nth-child(6n+1) { grid-row: span 2; } 
        .grid-item:nth-child(6n+4) { grid-row: span 2; grid-column: 2; }

        .grid-item img, .grid-item video {
            width: 100%; height: 100%;
            object-fit: cover;
        }

        .price-style-1 {
            position: absolute; bottom: 12px; right: 12px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 4px 12px; border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-weight: 800; font-size: 11px; color: #fff;
            z-index: 10;
        }

        /* FULL SCREEN MODAL (COVERING EVERYTHING) */
        #full-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: black;
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }
        #modal-content img, #modal-content video {
            width: 100%; height: 100%;
            object-fit: cover; /* No black spaces */
        }
        .close-btn {
            position: absolute; top: 20px; right: 20px;
            font-size: 30px; color: white; z-index: 10000;
            cursor: pointer; background: rgba(0,0,0,0.3);
            width: 40px; height: 40px; display: flex;
            justify-content: center; align-items: center; border-radius: 50%;
        }
        
    </style>
</head>
<body>

    <div id="full-modal">
        <span class="close-btn" onclick="closeFull()">&times;</span>
        <div id="modal-content" class="w-full h-full"></div>
    </div>

    <header class="profile-header">
        <div class="profile-pic-container">
            <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=400" class="profile-pic">
            <span class="premium-badge">PREMIUM</span>
        </div>
        
        <h1 class="text-2xl font-bold tracking-tight" style="font-family: 'Syne';">WOLAY STORE <i class="fa-solid fa-circle-check text-blue-500 text-sm"></i></h1>
        <p class="text-gray-400 text-sm mt-1">Luxury Atamfas & Executive Brocades</p>
        <p class="text-[11px] text-[#D4AF37] mt-1">📍 Abuja, Nigeria</p>

        <div class="stats-bar">
            <div class="stat-item"><div class="stat-value">1,432</div><div class="stat-label">Posts</div></div>
            <div class="stat-item"><div class="stat-value">45.8K</div><div class="stat-label">Followers</div></div>
            <div class="stat-item"><div class="stat-value">210</div><div class="stat-label">Following</div></div>
        </div>

        <div class="flex gap-3 mt-4">
            <button class="flex-1 bg-white text-black font-bold py-2 rounded-lg text-sm transition active:scale-95">Follow</button>
            <button class="flex-1 bg-transparent border border-gray-600 font-bold py-2 rounded-lg text-sm transition active:scale-95">Message</button>
        </div>
    </header>

    <div class="highlights-container">
        <div class="highlight-item">
            <div class="circle-glow" style="background: linear-gradient(45deg, #f093fb, #f5576c);"><div class="circle-inner"><img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=200"></div></div>
            <span class="highlight-label">New</span>
        </div>
        <div class="highlight-item">
            <div class="circle-glow" style="background: linear-gradient(45deg, #5ee7df, #b490ca);"><div class="circle-inner"><img src="https://images.unsplash.com/photo-1606107557195-0e29a4b5b4aa?w=200"></div></div>
            <span class="highlight-label">Offers</span>
        </div>
        <div class="highlight-item">
            <div class="circle-glow" style="background: linear-gradient(45deg, #f6d365, #fda085);"><div class="circle-inner"><img src="https://images.unsplash.com/photo-1595950653106-6c9ebd614d3a?w=200"></div></div>
            <span class="highlight-label">Reviews</span>
        </div>
        <div class="highlight-item">
            <div class="circle-glow" style="background: linear-gradient(45deg, #00f2fe, #4facfe);"><div class="circle-inner"><img src="https://images.unsplash.com/photo-1560769629-975ec94e6a86?w=200"></div></div>
            <span class="highlight-label">Videos</span>
        </div>
    </div>

    <main class="product-grid" id="vendor-grid"></main>

    <script>
        const products = [
            { img: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500", price: "45,000" },
            // WANNAN BOX DIN NA BIYU SHINE VIDEO NA GWAJI:
            { img: "https://www.w3schools.com/html/mov_bbb.mp4", price: "22,500", isVideo: true },
            { img: "https://images.unsplash.com/photo-1595950653106-6c9ebd614d3a?w=500", price: "18,000" },
            { img: "https://images.unsplash.com/photo-1560769629-975ec94e6a86?w=500", price: "32,000" },
            { img: "https://images.unsplash.com/photo-1525966222134-fcfa99b8ae77?w=500", price: "27,000" },
            { img: "https://images.unsplash.com/photo-1491553895911-0055eca6402d?w=500", price: "55,000" },
            { img: "https://images.unsplash.com/photo-1584273143981-43c2910f33cc?w=500", price: "12,500" },
            { img: "https://images.unsplash.com/photo-1591366754631-1305d9777118?w=500", price: "40,000" },
            { img: "https://images.unsplash.com/photo-1512436991641-6745cdb1723f?w=500", price: "21,000" },
            { img: "https://images.unsplash.com/photo-1539109132374-348214a3c239?w=500", price: "38,500" },
            { img: "https://images.unsplash.com/photo-1445205174273-59396b27d0d0?w=500", price: "29,000" },
            { img: "https://images.unsplash.com/photo-1485230895905-ec40ba36b9bc?w=500", price: "15,000" }
        ];

        const grid = document.getElementById('vendor-grid');
        grid.innerHTML = products.map(p => `
            <div class="grid-item" onclick="openFull('${p.img}', ${p.isVideo || false})">
                ${p.isVideo ? `<video src="${p.img}" muted loop autoplay class="w-full h-full object-cover"></video>` : `<img src="${p.img}" loading="lazy">`}
                <div class="price-style-1">₦${p.price}</div>
            </div>
        `).join('');

        function openFull(src, isVideo) {
            const modal = document.getElementById('full-modal');
            const content = document.getElementById('modal-content');
            modal.style.display = 'flex';
            if (isVideo) {
                // An saka 'controls' kuma babu 'muted' domin a ji sauti
                content.innerHTML = `<video src="${src}" autoplay loop playsinline controls class="w-full h-full object-cover"></video>`;
            } else {
                content.innerHTML = `<img src="${src}" class="w-full h-full object-cover">`;
            }
        }

        function closeFull() {
            const modal = document.getElementById('full-modal');
            document.getElementById('modal-content').innerHTML = '';
            modal.style.display = 'none';
        }
    </script>
</body>
            </html>
