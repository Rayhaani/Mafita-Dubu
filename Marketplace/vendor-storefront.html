<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wolay Store | Futuristic Vendor Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Syne:wght@700&display=swap');

        body {
            background: #0f1012; 
            color: white;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* 1. GLASS-MORPHISM PROFILE SECTION (An dawo da duka rubutun) */
        .profile-header {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.01));
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            padding: 30px 20px;
            text-align: center;
        }

        .profile-pic-container {
            position: relative;
            display: inline-block;
            margin-bottom: 15px;
        }

        .profile-pic {
            width: 100px; height: 100px;
            border-radius: 50%;
            border: 3px solid #D4AF37;
            padding: 3px;
            object-fit: cover;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        .premium-badge {
            position: absolute; bottom: 5px; right: 5px;
            background: #D4AF37; color: black;
            font-size: 10px; font-weight: 800;
            padding: 2px 6px; border-radius: 10px;
            border: 2px solid #0f1012;
        }

        /* STATS SECTION */
        .stats-bar {
            display: flex; justify-content: center; gap: 30px; margin: 20px 0;
        }
        .stat-item { text-align: center; }
        .stat-value { font-weight: 800; font-size: 18px; color: #D4AF37; }
        .stat-label { font-size: 12px; color: #888; text-transform: uppercase; }

        /* 2. MASONRY GRID (Dense & Alternating) */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            grid-auto-rows: 150px; 
            grid-auto-flow: dense;
            gap: 10px; 
            padding: 15px;
            margin-bottom: 100px;
        }

        .grid-item {
            position: relative;
            overflow: hidden;
            background: #1a1b1e;
            border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* Tsarin manyan boxes dake sabawa */
        .grid-item:nth-child(6n+1) { grid-row: span 2; } 
        .grid-item:nth-child(6n+4) { grid-row: span 2; grid-column: 2; }

        .grid-item img {
            width: 100%; height: 100%;
            object-fit: cover;
            transition: 0.5s;
        }

        /* 3. BOTTOM NAV */
        .bottom-glow-nav {
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            background: rgba(26, 15, 13, 0.8);
            backdrop-filter: blur(15px);
            padding: 12px 30px;
            border-radius: 40px;
            display: flex; gap: 40px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 1000;
        }

        .nav-link { color: #888; font-size: 20px; transition: 0.3s; }
        .nav-link.active { color: #D4AF37; text-shadow: 0 0 10px #D4AF37; }
    </style>
</head>
<body>

    <header class="profile-header">
        <div class="profile-pic-container">
            <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=400" class="profile-pic" alt="Vendor">
            <span class="premium-badge">PREMIUM</span>
        </div>
        
        <h1 class="text-2xl font-bold tracking-tight" style="font-family: 'Syne';">WOLAY STORE <i class="fa-solid fa-circle-check text-blue-500 text-sm"></i></h1>
        <p class="text-gray-400 text-sm mt-1">Luxury Atamfas & Executive Brocades</p>
        <p class="text-[11px] text-[#D4AF37] mt-1">📍 Abuja, Nigeria</p>

        <div class="stats-bar">
            <div class="stat-item"><div class="stat-value">1,432</div><div class="stat-label">Posts</div></div>
            <div class="stat-item"><div class="stat-value">45.8K</div><div class="stat-label">Followers</div></div>
            <div class="stat-item"><div class="stat-value">210</div><div class="stat-label">Following</div></div>
        </div>

        <div class="flex gap-3 mt-4">
            <button class="flex-1 bg-white text-black font-bold py-2 rounded-lg text-sm transition active:scale-95">Follow</button>
            <button class="flex-1 bg-transparent border border-gray-600 font-bold py-2 rounded-lg text-sm transition active:scale-95">Message</button>
        </div>
    </header>

    <div class="flex justify-around py-3 border-b border-gray-800 text-gray-500">
        <div class="text-[#D4AF37] border-b-2 border-[#D4AF37] pb-2 px-4"><i class="fa-solid fa-table-cells"></i></div>
        <div><i class="fa-solid fa-clapperboard"></i></div>
        <div><i class="fa-solid fa-user-tag"></i></div>
    </div>

    <main class="product-grid" id="vendor-grid"></main>

    <nav class="bottom-glow-nav">
        <a href="#" class="nav-link"><i class="fa-solid fa-house"></i></a>
        <a href="#" class="nav-link active"><i class="fa-solid fa-shop"></i></a>
        <a href="#" class="nav-link"><i class="fa-solid fa-magnifying-glass"></i></a>
        <a href="#" class="nav-link"><i class="fa-solid fa-bag-shopping"></i></a>
    </nav>

    <script>
        const products = [
            { img: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500" },
            { img: "https://images.unsplash.com/photo-1606107557195-0e29a4b5b4aa?w=500" },
            { img: "https://images.unsplash.com/photo-1595950653106-6c9ebd614d3a?w=500" },
            { img: "https://images.unsplash.com/photo-1560769629-975ec94e6a86?w=500" },
            { img: "https://images.unsplash.com/photo-1525966222134-fcfa99b8ae77?w=500" },
            { img: "https://images.unsplash.com/photo-1491553895911-0055eca6402d?w=500" },
            { img: "https://images.unsplash.com/photo-1584273143981-43c2910f33cc?w=500" },
            { img: "https://images.unsplash.com/photo-1591366754631-1305d9777118?w=500" },
            { img: "https://images.unsplash.com/photo-1512436991641-6745cdb1723f?w=500" },
            { img: "https://images.unsplash.com/photo-1539109132374-348214a3c239?w=500" }
        ];

        const grid = document.getElementById('vendor-grid');
        grid.innerHTML = products.map(p => `
            <div class="grid-item">
                <img src="${p.img}" loading="lazy">
            </div>
        `).join('');
    </script>
</body>
  </html>
